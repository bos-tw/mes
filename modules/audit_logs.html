<div data-module="audit_logs">
<div class="content-header with-actions">
    <div>
        <h2>操作日誌</h2>
        <p class="subtitle">唯讀檢視與匯出系統自動產生的不可變操作紀錄</p>
    </div>
    <div class="header-actions">
        <button type="button" class="btn secondary" data-action="export">
            <i class="fas fa-file-export"></i>
            <span>匯出</span>
        </button>
    </div>
</div>
<div class="content-area">
    <div class="module-alert hidden" data-auditlogs-alert></div>

    <section class="module-toolbar compact">
        <form class="filter-form" data-auditlogs-filter>
            <div class="form-grid">
                <label>
                    <span>關鍵字</span>
                    <input type="text" name="keyword" placeholder="動作 / 目標資料表 / IP" autocomplete="off">
                </label>
                <label>
                    <span>每頁筆數</span>
                    <select name="perPage">
                        <option value="10">10</option>
                        <option value="20">20</option>
                        <option value="50">50</option>
                    </select>
                </label>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn primary small">套用</button>
                <button type="button" class="btn outline small" data-action="reset-filter">重設</button>
            </div>
        </form>
    </section>

    <section class="table-section">
        <div class="table-responsive">
            <table class="data-table" data-auditlogs-table>
                <thead>
                    <tr>
                        <th data-sort="employee_name">員工 <i class="fas fa-sort"></i></th>
                        <th data-sort="action">動作 <i class="fas fa-sort"></i></th>
                        <th data-sort="target_table">目標資料表 <i class="fas fa-sort"></i></th>
                        <th data-sort="ip_address">IP 位址 <i class="fas fa-sort"></i></th>
                        <th data-sort="created_at">建立時間 <i class="fas fa-sort"></i></th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="6" class="text-center">資料載入中...</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="pagination" data-auditlogs-pagination></div>
    </section>

    <div class="modal-overlay hidden" data-auditlogs-detail-modal>
        <div class="modal-window large">
            <button type="button" class="modal-close" data-action="close-detail-modal" aria-label="關閉">
                <i class="fas fa-times"></i>
            </button>
            <h3>日誌詳細資訊</h3>
            <div class="detail-content" data-detail-content>
                <dl>
                    <div>
                        <dt>ID</dt>
                        <dd data-detail-field="id"></dd>
                    </div>
                    <div>
                        <dt>員工</dt>
                        <dd data-detail-field="employee"></dd>
                    </div>
                    <div>
                        <dt>動作</dt>
                        <dd data-detail-field="action"></dd>
                    </div>
                    <div>
                        <dt>目標資料表</dt>
                        <dd data-detail-field="target_table"></dd>
                    </div>
                    <div>
                        <dt>目標 ID</dt>
                        <dd data-detail-field="target_id"></dd>
                    </div>
                    <div>
                        <dt>IP 位址</dt>
                        <dd data-detail-field="ip_address"></dd>
                    </div>
                    <div>
                        <dt>建立時間</dt>
                        <dd data-detail-field="created_at"></dd>
                    </div>
                </dl>
                <div class="detail-section">
                    <h4>詳細資料</h4>
                    <pre data-detail-field="details" class="detail-pre"></pre>
                </div>
            </div>
        </div>
    </div>
</div>
</div>
