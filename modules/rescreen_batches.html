<div class="modal-overlay hidden" data-rescreen-batches-modal>
    <div class="modal-window large">
        <button type="button" class="modal-close" data-action="close-modal" aria-label="關閉">
            <i class="fas fa-times"></i>
        </button>
        <h3 data-modal-title>新增二次篩選紀錄</h3>
        <div class="modal-alert hidden" data-rescreen-batches-modal-alert role="alert"></div>

        <form data-rescreen-batches-form novalidate>
            <input type="hidden" name="id">
            <input type="hidden" name="source_work_order_id">
            <input type="hidden" name="source_defect_history_record_id">
            <div class="form-row">
                <section class="form-section">
                    <h4>來源與類型</h4>
                    <div class="form-grid">
                        <label class="inline-label">
                            <span>來源退貨單</span>
                            <select name="source_return_order_id">
                                <option value="">-- 請選擇退貨單 --</option>
                            </select>
                        </label>
                        <label class="inline-label">
                            <span>案件類型 <abbr title="必填">*</abbr></span>
                            <select name="rescreen_type" required>
                                <option value="strict_rescreen">嚴格二篩</option>
                                <option value="relaxed_rescreen">放寬二篩</option>
                            </select>
                        </label>
                        <label class="inline-label">
                            <span>二次篩選原因 <abbr title="必填">*</abbr></span>
                            <input type="text" name="second_screening_reason" maxlength="255" required placeholder="請輸入本次二次篩選原因">
                        </label>
                        <label class="inline-label">
                            <span>案件狀態</span>
                            <select name="status">
                                <option value="draft">草稿</option>
                                <option value="planned">已排程</option>
                                <option value="in_progress">進行中</option>
                                <option value="completed">已完成</option>
                                <option value="cancelled">已取消</option>
                            </select>
                        </label>
                    </div>
                </section>

                <section class="form-section">
                    <h4>佐證與備註</h4>
                    <div class="form-grid">
                        <label class="inline-label full-width">
                            <span>客戶通知 / 標準佐證</span>
                            <textarea name="customer_approval_reference" rows="2" placeholder="例如：客戶 Email、LINE 通知、放寬後標準或每批二篩要求"></textarea>
                        </label>
                        <label class="inline-label full-width">
                            <span>備註</span>
                            <textarea name="notes" rows="3" placeholder="補充這次二次篩選的背景、交辦事項或追蹤重點"></textarea>
                        </label>
                    </div>
                </section>
            </div>

            <section class="form-section">
                <h4>來源摘要</h4>
                <div class="detail-grid" data-rescreen-source-summary>
                    <p class="text-muted">請先選擇退貨單，或從生產工單建立二次篩選。</p>
                </div>
            </section>

            <section class="form-section">
                <h4>二篩執行結果</h4>
                <div class="form-grid">
                    <label class="inline-label">
                        <span>開始時間</span>
                        <input type="datetime-local" name="started_at" readonly>
                    </label>
                    <label class="inline-label">
                        <span>完成時間</span>
                        <input type="datetime-local" name="completed_at" readonly>
                    </label>
                    <label class="inline-label">
                        <span>良品數</span>
                        <input type="number" name="rescreen_output_good_units" min="0" step="0.01" placeholder="0" readonly>
                    </label>
                    <label class="inline-label">
                        <span>再次不良數</span>
                        <input type="number" name="rescreen_output_defect_units" min="0" step="0.01" placeholder="0" readonly>
                    </label>
                    <label class="inline-label">
                        <span>報廢 / 其他處置數</span>
                        <input type="number" name="rescreen_output_scrap_units" min="0" step="0.01" placeholder="0" readonly>
                    </label>
                </div>
                <p class="text-muted">以上摘要會依二次篩分服務明細與生產記錄自動計算，儲存後同步更新。</p>
            </section>

            <section class="form-section">
                <h4>二次篩分服務不良明細</h4>
                <div data-rescreen-defect-editor></div>
            </section>

            <section class="form-section">
                <div class="form-section-heading">
                    <h4>二次篩選生產記錄</h4>
                    <button type="button" class="btn outline small" data-action="add-production-record">新增一筆</button>
                </div>
                <div data-rescreen-production-editor></div>
            </section>

            <div class="form-actions align-right">
                <button type="button" class="btn outline" data-action="cancel">取消</button>
                <button type="submit" class="btn primary">儲存</button>
            </div>
        </form>
    </div>
</div>

<div class="modal-overlay hidden" data-rescreen-batches-detail-modal>
    <div class="modal-window xlarge">
        <button type="button" class="modal-close" data-action="close-detail-modal" aria-label="關閉">
            <i class="fas fa-times"></i>
        </button>
        <h3><i class="fas fa-redo"></i> 二次篩選歷史詳情</h3>
        <div class="detail-content" data-rescreen-batches-detail></div>
        <div class="form-actions align-right">
            <button type="button" class="btn outline" data-action="close-detail-modal">關閉</button>
            <button type="button" class="btn primary" data-action="edit-from-detail">編輯</button>
        </div>
    </div>
</div>
