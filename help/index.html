<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精密光學篩選管理系統 - 系統使用指南</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <!-- 頂部導航 -->
    <header class="top-header">
        <div class="header-left">
            <button class="sidebar-toggle" id="sidebar-toggle" title="切換側邊欄">
                <i class="fas fa-bars"></i>
            </button>
            <a href="../index.html" class="back-link">
                <i class="fas fa-arrow-left"></i> 返回系統
            </a>
            <h1 class="site-title">精密光學篩選管理系統 - 系統使用指南</h1>
        </div>
        <div class="header-right">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="搜尋文件...">
            </div>
        </div>
    </header>

    <div class="main-container">
        <!-- 側邊欄導航 -->
        <aside class="sidebar" id="sidebar">
            <nav class="sidebar-nav" id="sidebar-nav">
                <!-- 由 JS 動態生成 -->
            </nav>
        </aside>

        <!-- 主要內容區 -->
        <main class="main-content" id="main-content">
            <div class="content-area" id="content-area">
                <!-- 由 JS 動態載入 -->
            </div>

            <!-- 頁面導航 -->
            <nav class="page-nav" id="page-nav">
                <a href="#" class="prev-page" id="prev-page" style="display: none;">
                    <i class="fas fa-chevron-left"></i>
                    <span class="nav-label">上一篇</span>
                    <span class="nav-title" id="prev-title"></span>
                </a>
                <a href="#" class="next-page" id="next-page" style="display: none;">
                    <span class="nav-label">下一篇</span>
                    <span class="nav-title" id="next-title"></span>
                    <i class="fas fa-chevron-right"></i>
                </a>
            </nav>
        </main>

        <!-- 右側目錄 -->
        <aside class="toc-sidebar" id="toc-sidebar">
            <div class="toc-title">本頁目錄</div>
            <ul class="toc-list" id="toc-list">
                <!-- 由 JS 動態生成 -->
            </ul>
        </aside>
    </div>

    <!-- 搜尋結果彈窗 -->
    <div class="search-modal" id="search-modal">
        <div class="search-modal-content">
            <button type="button" class="modal-close" id="close-search-modal" aria-label="關閉">
                <i class="fas fa-times"></i>
            </button>
            <h3>文件搜尋</h3>
            <div class="search-modal-header">
                <input type="text" id="search-modal-input" placeholder="輸入關鍵字搜尋...">
            </div>
            <div class="search-results" id="search-results">
                <!-- 搜尋結果 -->
            </div>
        </div>
    </div>

    <!-- 回到頂部 -->
    <button class="back-to-top" id="back-to-top" title="回到頂部">
        <i class="fas fa-chevron-up"></i>
    </button>

    <script src="workflow-content.js"></script>
    <script src="content.js"></script>
    <script src="script.js"></script>
</body>
</html>
