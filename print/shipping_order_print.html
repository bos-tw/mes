<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>出貨單 - 列印</title>
    <style>
        @page {
            size: A5 landscape; /* 中一刀尺寸 (A4/2) 橫向 = 210mm x 148mm */
            margin: 6mm;
        }

        body {
            font-family: "Microsoft JhengHei", "SimHei", sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #000;
            font-size: 10pt;
            line-height: 1.05;
        }

        .page-container {
            background-color: white;
            width: 210mm;
            height: 148mm;
            margin: 20px auto;
            padding: 6mm;
            box-sizing: border-box;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            page-break-after: always;
        }

        .page-container:last-child {
            page-break-after: auto;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* 公司資訊區 (頁首) */
        .company-header {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 12px;
            padding-bottom: 2px;
            margin-bottom: 2px;
            border-bottom: 2px solid #000;
        }

        .company-header .company-logo {
            height: 50px;
            max-height: 55px;
            width: auto;
            object-fit: contain;
            flex-shrink: 0;
        }

        .company-header .company-logo:not([src]),
        .company-header .company-logo[src=""],
        .company-header .company-logo.hidden {
            display: none;
        }

        .company-header .company-info {
            flex: 1;
        }

        .company-header .company-name {
            font-size: 16pt;
            font-weight: bold;
            margin-bottom: 1px;
        }

        .company-header .company-details {
            font-size: 9pt;
            color: #444;
            line-height: 1.1;
        }

        /* 標題區 */
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3px;
            padding-bottom: 2px;
        }

        .company-branding {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .company-logo {
            height: 35px;
            max-height: 40px;
            width: auto;
            object-fit: contain;
        }

        .company-logo:not([src]),
        .company-logo[src=""],
        .company-logo.hidden {
            display: none;
        }

        .main-title {
            font-size: 18pt;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .header-info {
            text-align: right;
        }

        .so-number {
            font-size: 12pt;
            font-weight: bold;
        }

        .so-date {
            font-size: 10pt;
            color: #444;
            margin-top: 1px;
        }

        /* 客戶資訊區 */
        .customer-section {
            display: flex;
            justify-content: space-between;
            margin-bottom: 3px;
            padding: 2px 0;
            border-bottom: 1px solid #ccc;
        }

        .customer-info {
            flex: 1;
        }

        .customer-info .label {
            font-size: 9pt;
            color: #666;
        }

        .customer-info .value {
            font-size: 12pt;
            font-weight: bold;
        }

        .order-reference {
            text-align: right;
        }

        .order-reference .label {
            font-size: 9pt;
            color: #666;
        }

        .order-reference .value {
            font-size: 11pt;
        }

        /* 最低委託額度警示 */
        .minimum-amount-warning {
            background-color: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 3px;
            padding: 2px 4px;
            margin-bottom: 3px;
            font-size: 9pt;
            color: #856404;
            display: none;
        }

        .minimum-amount-warning.show {
            display: block;
        }

        .minimum-amount-warning i {
            margin-right: 4px;
        }

        /* 品項表格 */
        .items-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 3px;
            flex: 1;
        }

        .items-table th,
        .items-table td {
            border: 1px solid #333;
            padding: 1px 2px;
            font-size: 9.5pt;
            vertical-align: top;
        }

        .items-table th {
            background-color: #e6e6e6;
            font-weight: bold;
            text-align: center;
            white-space: nowrap;
            padding-top: 3px;
            padding-bottom: 3px;
        }

        .items-table td.text-center {
            text-align: center;
        }

        .items-table td.text-right {
            text-align: right;
        }

        .items-table .item-name {
            max-width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .items-table .batch-number {
            font-size: 9pt;
            color: #666;
        }

        /* 備註區 */
        .notes-section {
            margin-top: 3px;
            padding: 2px 4px;
            border: 1px solid #ccc;
            background-color: #fafafa;
            font-size: 9pt;
        }

        .notes-section .notes-title {
            font-weight: bold;
            margin-bottom: 1px;
            color: #333;
        }

        .notes-section .notes-content {
            color: #555;
            white-space: pre-line;
            line-height: 1.1;
        }

        .supplement-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-top: 4px;
        }

        .supplement-card {
            border: 1px solid #ccc;
            background-color: #fafafa;
            padding: 2px 4px;
            font-size: 9pt;
        }

        .supplement-card .card-title {
            font-weight: bold;
            color: #333;
            margin-bottom: 1px;
        }

        .supplement-metrics {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            margin-bottom: 3px;
        }

        .supplement-metric {
            border: 1px solid #ddd;
            background-color: #fff;
            padding: 1px 2px;
        }

        .supplement-metric .label {
            font-size: 8.5pt;
            color: #666;
            display: block;
        }

        .supplement-metric .value {
            font-size: 10pt;
            font-weight: bold;
            display: block;
            margin-top: 1px;
        }

        .supplement-note {
            color: #555;
            min-height: 18px;
            white-space: pre-line;
        }

        .tool-summary-table {
            width: 100%;
            border-collapse: collapse;
        }

        .tool-summary-table th,
        .tool-summary-table td {
            border: 1px solid #ddd;
            padding: 1px 2px;
            font-size: 9pt;
        }

        .tool-summary-table th {
            background-color: #f0f0f0;
            text-align: center;
            font-weight: bold;
        }

        /* 合計區 */
        .summary-section {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 4px 10px;
            padding: 2px 0;
            border-top: 2px solid #000;
            margin-top: auto;
        }

        .summary-item {
            text-align: right;
        }

        .summary-item .label {
            font-size: 9pt;
            color: #666;
        }

        .summary-item .value {
            font-size: 12pt;
            font-weight: bold;
        }

        /* 簽核區 */
        .signature-section {
            display: flex;
            justify-content: space-between;
            margin-top: 3px;
            padding-top: 3px;
            border-top: 1px dashed #ccc;
        }

        .signature-box {
            width: 30%;
            text-align: center;
        }

        .signature-box .title {
            font-size: 9pt;
            color: #666;
            margin-bottom: 16px;
        }

        .signature-box .line {
            border-bottom: 1px solid #333;
            margin: 0 10px;
        }

        /* 頁尾 */
        .footer-section {
            font-size: 8pt;
            color: #999;
            text-align: center;
            margin-top: 2px;
            padding-top: 2px;
            border-top: 1px solid #ddd;
        }

        /* 列印樣式 */
        @media print {
            body {
                background-color: white;
            }

            .page-container {
                margin: 0;
                box-shadow: none;
                page-break-after: always;
            }

            .no-print {
                display: none !important;
            }
        }

        /* 列印工具列 */
        .print-toolbar {
            position: fixed;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 8px;
            z-index: 1000;
        }

        .print-toolbar button {
            padding: 8px 16px;
            font-size: 12px;
            cursor: pointer;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: white;
        }

        .print-toolbar button.primary {
            background-color: #007bff;
            color: white;
            border-color: #007bff;
        }

        .print-toolbar button:hover {
            opacity: 0.9;
        }

        /* 空白狀態 */
        .empty-state {
            text-align: center;
            padding: 30px;
            color: #666;
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 10px;
            color: #ccc;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <!-- 列印工具列 -->
    <div class="print-toolbar no-print">
        <button onclick="window.print()" class="primary">
            <i class="fas fa-print"></i> 列印
        </button>
        <button onclick="window.close()">
            <i class="fas fa-times"></i> 關閉
        </button>
    </div>

    <div id="print-content">
        <!-- 頁面內容將由 JavaScript 動態載入 -->
        <div class="page-container">
            <div class="main-content">
                <div class="empty-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>載入出貨單資料中...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // 快取變數
            let companyInfoCache = null;
            let companyLogoCache = null;
            let reportDescriptionCache = null;
            let currentUserCache = null;

            // 從 URL 取得參數
            const urlParams = new URLSearchParams(window.location.search);
            const shippingOrderId = urlParams.get('id');
            const isPreviewMode = urlParams.get('preview') === '1';

            if (!shippingOrderId && !isPreviewMode) {
                showError('缺少出貨單 ID 參數');
                return;
            }

            document.title = isPreviewMode ? '出貨單 - 空白預覽' : '出貨單 - 列印';

            // 載入所有資料
            loadAllData(shippingOrderId);

            async function loadAllData(id) {
                try {
                    const loadTasks = [
                        loadCompanyInfo(1),
                        loadCompanyLogo(1),
                        loadReportDescription('shipping_order'),
                        loadCurrentUser()
                    ];

                    if (isPreviewMode) {
                        const [companyInfo, companyLogo, reportDesc, currentUser] = await Promise.all(loadTasks);
                        const previewOrder = buildPreviewShippingOrder();
                        renderShippingOrder(previewOrder, [], null, [], companyInfo, companyLogo, reportDesc, currentUser);
                        return;
                    }

                    const [orderResult, companyInfo, companyLogo, reportDesc, currentUser] = await Promise.all([
                        loadShippingOrder(id),
                        ...loadTasks
                    ]);

                    if (orderResult) {
                        renderShippingOrder(orderResult.order, orderResult.items, orderResult.defectSummary, orderResult.toolSummaries, companyInfo, companyLogo, reportDesc, currentUser);
                    }
                } catch (error) {
                    console.error('載入資料失敗:', error);
                    showError('載入出貨單失敗: ' + error.message);
                }
            }

            async function loadShippingOrder(id) {
                const response = await fetch(`../api/shipping_orders/show.php?id=${id}`, { credentials: 'include' });
                const result = await response.json();

                if (!result.success) {
                    showError(result.message || '載入出貨單失敗');
                    return null;
                }

                return {
                    order: result.order,
                    items: result.items || [],
                    defectSummary: result.defect_summary || result.order?.defect_summary || null,
                    toolSummaries: result.tool_summaries || result.order?.tool_summaries || []
                };
            }

            async function loadCompanyInfo(companyId = 1) {
                if (companyInfoCache) return companyInfoCache;
                try {
                    const response = await fetch(`../api/companies/public_info.php?id=${companyId}`, { credentials: 'include' });
                    const result = await response.json();
                    if (result.success && result.data) {
                        companyInfoCache = result.data;
                    }
                } catch (e) {
                    console.error('載入公司資訊失敗:', e);
                }
                return companyInfoCache;
            }

            async function loadCompanyLogo(companyId = 1) {
                if (companyLogoCache !== null) return companyLogoCache;
                try {
                    const response = await fetch(`../api/companies/public_logo.php?company_id=${companyId}`, { credentials: 'include' });
                    const result = await response.json();
                    if (result.success && result.data) {
                        companyLogoCache = result.data.file_path;
                    } else {
                        companyLogoCache = '';
                    }
                } catch (e) {
                    console.error('載入公司 LOGO 失敗:', e);
                    companyLogoCache = '';
                }
                return companyLogoCache;
            }

            async function loadReportDescription(reportCode) {
                if (reportDescriptionCache) return reportDescriptionCache;
                try {
                    const response = await fetch(`../api/report_descriptions/show.php?report_code=${reportCode}`, { credentials: 'include' });
                    const result = await response.json();
                    if (result.success && result.data) {
                        reportDescriptionCache = result.data;
                    }
                } catch (e) {
                    console.error('載入報表說明失敗:', e);
                }
                return reportDescriptionCache;
            }

            async function loadCurrentUser() {
                if (currentUserCache) return currentUserCache;
                try {
                    const response = await fetch('../api/session.php', { credentials: 'include' });
                    const result = await response.json();
                    if (result.success && result.data) {
                        currentUserCache = result.data;
                    }
                } catch (e) {
                    console.error('載入登入者資訊失敗:', e);
                }
                return currentUserCache;
            }

            function buildPreviewShippingOrder() {
                return {
                    shipping_order_number: '',
                    shipping_date: '',
                    customer_name: '',
                    order_number: '',
                    shipment_purpose: 'normal',
                    customer: {
                        minimum_order_amount: 0
                    },
                    order: {
                        total_amount: 0
                    }
                };
            }

            function renderShippingOrder(order, items, defectSummary, toolSummaries, companyInfo, companyLogo, reportDesc, currentUser) {
                const company = companyInfo || {};
                const logoPath = companyLogo || '';
                const reportNotes = reportDesc?.description || '';
                const operatorName = currentUser?.name || currentUser?.employee_name || '-';
                const shippingPurposeLabels = {
                    normal: '一般出貨',
                    defect_return: '不良回送',
                    tool_return: '載具歸還',
                    mixed: '混合出貨'
                };

                // 計算合計
                let totalQuantity = 0;
                let totalWeight = 0;
                const processedItems = buildPrintableItems(items);
                processedItems.forEach(item => {
                    totalQuantity += item.quantityValue;
                    totalWeight += item.weightValue;
                });

                // 最低委託額度警示
                const minimumAmount = parseFloat(order.customer?.minimum_order_amount || 0);
                const orderTotal = parseFloat(order.order?.total_amount || 0);
                const isBelowMinimum = minimumAmount > 0 && orderTotal < minimumAmount;

                const html = `
                    <div class="page-container">
                        <div class="main-content">
                            <!-- 公司資訊區 (頁首) -->
                            <div class="company-header">
                                ${logoPath ? `<img src="../${escapeHtml(logoPath)}" alt="公司 LOGO" class="company-logo" onerror="this.classList.add('hidden')">` : ''}
                                <div class="company-info">
                                    <div class="company-name">${escapeHtml(company.name || '')}</div>
                                    <div class="company-details">
                                        ${company.address ? `地址：${escapeHtml(company.address)}<br>` : ''}
                                        ${company.phone ? `電話：${escapeHtml(company.phone)}` : ''}${company.fax ? ` / 傳真：${escapeHtml(company.fax)}` : ''}
                                    </div>
                                </div>
                            </div>

                            <!-- 標題區 -->
                            <div class="header-section">
                                <div class="company-branding">
                                    <span class="main-title">出 貨 單</span>
                                </div>
                                <div class="header-info">
                                    <div class="so-number">${escapeHtml(order.shipping_order_number || '')}</div>
                                    <div class="so-date">出貨日期：${formatDate(order.shipping_date)}</div>
                                </div>
                            </div>

                            <!-- 客戶資訊 -->
                            <div class="customer-section">
                                <div class="customer-info">
                                    <div class="label">客戶名稱</div>
                                    <div class="value">${escapeHtml(order.customer_name || '-')}</div>
                                </div>
                                <div class="order-reference">
                                    <div class="label">出貨性質</div>
                                    <div class="value">${escapeHtml(shippingPurposeLabels[order.shipment_purpose || 'normal'] || '一般出貨')}</div>
                                </div>
                            </div>

                            <!-- 最低委託額度警示 -->
                            <div class="minimum-amount-warning ${isBelowMinimum ? 'show' : ''}">
                                <i class="fas fa-exclamation-triangle"></i>
                                訂單金額 $${formatNumber(orderTotal)} 低於客戶最低委託額度 $${formatNumber(minimumAmount)}
                            </div>

                            <!-- 品項表格 -->
                            <table class="items-table">
                                <thead>
                                    <tr>
                                        <th style="width: 45px;">桶號</th>
                                        <th>批號</th>
                                        <th>規格</th>
                                        <th style="width: 48px;">料號</th>
                                        <th style="width: 58px;">類別</th>
                                        <th style="width: 70px;">重量(KG)</th>
                                        <th style="width: 58px;">單重(G)</th>
                                        <th style="width: 72px;">數量(支)</th>
                                        <th style="width: 56px;">桶數</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${processedItems.length > 0 ? processedItems.map((item) => `
                                        <tr>
                                            <td class="text-center">${escapeHtml(item.bucket_number || '')}</td>
                                            <td>${escapeHtml(item.batch_number || '')}</td>
                                            <td class="item-name">${escapeHtml(item.specification || '')}</td>
                                            <td>${escapeHtml(item.item_number || '')}</td>
                                            <td class="text-center">${escapeHtml(item.category || '')}</td>
                                            <td class="text-right">${item.weightValue > 0 ? formatNumber(item.weightValue, 2) : ''}</td>
                                            <td class="text-right">${item.unitWeightValue > 0 ? formatNumber(item.unitWeightValue, 3) : ''}</td>
                                            <td class="text-right">${item.quantityValue > 0 ? formatNumber(item.quantityValue, 0) : ''}</td>
                                            <td class="text-center">${escapeHtml(item.bucket_count || '')}</td>
                                        </tr>
                                    `).join('') : `
                                        <tr>
                                            <td colspan="9" class="text-center">無出貨品項</td>
                                        </tr>
                                    `}
                                </tbody>
                            </table>

                            <!-- 備註區 -->
                            ${reportNotes ? `
                            <div class="notes-section">
                                <div class="notes-title">備註</div>
                                <div class="notes-content">${escapeHtml(reportNotes)}</div>
                            </div>
                            ` : ''}

                            <!-- 合計區 -->
                            <div class="summary-section">
                                <div class="summary-item">
                                    <div class="label">出貨品項數</div>
                                    <div class="value">${items.length} 項</div>
                                </div>
                                <div class="summary-item">
                                    <div class="label">出貨總數量</div>
                                    <div class="value">${formatNumber(totalQuantity, 0)} 支</div>
                                </div>
                                <div class="summary-item">
                                    <div class="label">出貨總重量</div>
                                    <div class="value">${formatNumber(totalWeight, 2)} kg</div>
                                </div>
                            </div>

                            <!-- 簽核區 -->
                            <div class="signature-section">
                                <div class="signature-box">
                                    <div class="title">經辦</div>
                                    <div>${escapeHtml(operatorName)}</div>
                                </div>
                                <div class="signature-box">
                                    <div class="title">收貨簽收</div>
                                    <div class="line"></div>
                                </div>
                                <div class="signature-box">
                                    <div class="title">備註</div>
                                    <div>${escapeHtml(order.notes || '-')}</div>
                                </div>
                            </div>
                        </div>

                        <!-- 頁尾 -->
                        <div class="footer-section">
                            列印時間：${new Date().toLocaleString('zh-TW')} | 出貨單編號：${escapeHtml(order.shipping_order_number || '')}
                        </div>
                    </div>
                `;

                document.getElementById('print-content').innerHTML = html;
                document.title = `出貨單 - ${order.shipping_order_number || ''}`;
            }

            function buildPrintableItems(items) {
                const rows = [];
                items.forEach((item) => {
                    const unitWeight = parseFloat(item.weight_per_unit_g || 0);
                    const totalQuantity = parseFloat(item.shipped_quantity || 0);
                    const defectQuantity = Math.max(parseFloat(item.total_defect_units || 0), 0);
                    const netWeight = parseFloat(item.net_weight_kg || 0);
                    const defectWeight = unitWeight > 0 && defectQuantity > 0 ? (defectQuantity * unitWeight) / 1000 : 0;
                    const goodQuantity = Math.max(totalQuantity - defectQuantity, 0);
                    const goodWeight = Math.max(netWeight - defectWeight, 0);
                    const baseRow = {
                        bucket_number: '',
                        batch_number: item.customer_batch_number || item.internal_lot_number || item.inventory_number || '',
                        specification: item.screening_item_name || item.product_name || item.work_order_number || '',
                        item_number: item.screening_item_number || '',
                        unitWeightValue: Number.isFinite(unitWeight) ? unitWeight : 0,
                        bucket_count: ''
                    };

                    if (goodQuantity > 0 || goodWeight > 0) {
                        rows.push({
                            ...baseRow,
                            category: '良品',
                            weightValue: Number.isFinite(goodWeight) ? goodWeight : 0,
                            quantityValue: Number.isFinite(goodQuantity) ? goodQuantity : 0
                        });
                    }

                    if (defectQuantity > 0 || defectWeight > 0) {
                        rows.push({
                            ...baseRow,
                            batch_number: '',
                            specification: '',
                            item_number: '',
                            category: '不良品',
                            weightValue: Number.isFinite(defectWeight) ? defectWeight : 0,
                            quantityValue: Number.isFinite(defectQuantity) ? defectQuantity : 0,
                            bucket_count: ''
                        });
                    }
                });
                return rows;
            }

            function showError(message) {
                document.getElementById('print-content').innerHTML = `
                    <div class="page-container">
                        <div class="main-content">
                            <div class="empty-state">
                                <i class="fas fa-exclamation-triangle"></i>
                                <p>${escapeHtml(message)}</p>
                            </div>
                        </div>
                    </div>
                `;
            }

            function escapeHtml(text) {
                if (text === null || text === undefined) return '';
                const div = document.createElement('div');
                div.textContent = String(text);
                return div.innerHTML;
            }

            function formatDate(dateStr) {
                if (!dateStr) return '-';
                const date = new Date(dateStr);
                if (isNaN(date.getTime())) return dateStr;
                return date.toLocaleDateString('zh-TW');
            }

            function formatNumber(value, decimals = 2) {
                if (value === null || value === undefined || value === '') return '0';
                const num = parseFloat(value);
                if (isNaN(num)) return '0';
                return num.toLocaleString('zh-TW', {
                    minimumFractionDigits: decimals,
                    maximumFractionDigits: decimals
                });
            }
        })();
    </script>
</body>
