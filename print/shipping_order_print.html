<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>出貨單 - 列印</title>
    <style>
        @page {
            size: A5 landscape; /* 中一刀尺寸 (A4/2) 橫向 = 210mm x 148mm */
            margin: 6mm;
        }

        body {
            font-family: "Microsoft JhengHei", "SimHei", sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #000;
            font-size: 8pt;
            line-height: 1.2;
        }

        .page-container {
            background-color: white;
            width: 210mm;
            height: 148mm;
            margin: 20px auto;
            padding: 6mm;
            box-sizing: border-box;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            page-break-after: always;
        }

        .page-container:last-child {
            page-break-after: auto;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* 公司資訊區 (頁首) */
        .company-header {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 12px;
            padding-bottom: 4px;
            margin-bottom: 4px;
            border-bottom: 2px solid #000;
        }

        .company-header .company-logo {
            height: 50px;
            max-height: 55px;
            width: auto;
            object-fit: contain;
            flex-shrink: 0;
        }

        .company-header .company-logo:not([src]),
        .company-header .company-logo[src=""],
        .company-header .company-logo.hidden {
            display: none;
        }

        .company-header .company-info {
            flex: 1;
        }

        .company-header .company-name {
            font-size: 14pt;
            font-weight: bold;
            margin-bottom: 2px;
        }

        .company-header .company-details {
            font-size: 7pt;
            color: #444;
            line-height: 1.4;
        }

        /* 標題區 */
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
            padding-bottom: 4px;
        }

        .company-branding {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .company-logo {
            height: 35px;
            max-height: 40px;
            width: auto;
            object-fit: contain;
        }

        .company-logo:not([src]),
        .company-logo[src=""],
        .company-logo.hidden {
            display: none;
        }

        .main-title {
            font-size: 16pt;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .header-info {
            text-align: right;
        }

        .so-number {
            font-size: 10pt;
            font-weight: bold;
        }

        .so-date {
            font-size: 8pt;
            color: #444;
            margin-top: 1px;
        }

        /* 客戶資訊區 */
        .customer-section {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            padding: 4px 0;
            border-bottom: 1px solid #ccc;
        }

        .customer-info {
            flex: 1;
        }

        .customer-info .label {
            font-size: 7pt;
            color: #666;
        }

        .customer-info .value {
            font-size: 10pt;
            font-weight: bold;
        }

        .order-reference {
            text-align: right;
        }

        .order-reference .label {
            font-size: 7pt;
            color: #666;
        }

        .order-reference .value {
            font-size: 9pt;
        }

        /* 最低委託額度警示 */
        .minimum-amount-warning {
            background-color: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 3px;
            padding: 3px 6px;
            margin-bottom: 5px;
            font-size: 7pt;
            color: #856404;
            display: none;
        }

        .minimum-amount-warning.show {
            display: block;
        }

        .minimum-amount-warning i {
            margin-right: 4px;
        }

        /* 品項表格 */
        .items-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 5px;
            flex: 1;
        }

        .items-table th,
        .items-table td {
            border: 1px solid #333;
            padding: 3px 4px;
            font-size: 7.5pt;
            vertical-align: top;
        }

        .items-table th {
            background-color: #e6e6e6;
            font-weight: bold;
            text-align: center;
            white-space: nowrap;
        }

        .items-table td.text-center {
            text-align: center;
        }

        .items-table td.text-right {
            text-align: right;
        }

        .items-table .item-name {
            max-width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .items-table .batch-number {
            font-size: 7pt;
            color: #666;
        }

        /* 備註區 */
        .notes-section {
            margin-top: 5px;
            padding: 4px 6px;
            border: 1px solid #ccc;
            background-color: #fafafa;
            font-size: 7pt;
        }

        .notes-section .notes-title {
            font-weight: bold;
            margin-bottom: 2px;
            color: #333;
        }

        .notes-section .notes-content {
            color: #555;
            white-space: pre-line;
            line-height: 1.4;
        }

        .supplement-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-top: 4px;
        }

        .supplement-card {
            border: 1px solid #ccc;
            background-color: #fafafa;
            padding: 4px 6px;
            font-size: 7pt;
        }

        .supplement-card .card-title {
            font-weight: bold;
            color: #333;
            margin-bottom: 3px;
        }

        .supplement-metrics {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            margin-bottom: 3px;
        }

        .supplement-metric {
            border: 1px solid #ddd;
            background-color: #fff;
            padding: 3px 4px;
        }

        .supplement-metric .label {
            font-size: 6.5pt;
            color: #666;
            display: block;
        }

        .supplement-metric .value {
            font-size: 8pt;
            font-weight: bold;
            display: block;
            margin-top: 1px;
        }

        .supplement-note {
            color: #555;
            min-height: 18px;
            white-space: pre-line;
        }

        .tool-summary-table {
            width: 100%;
            border-collapse: collapse;
        }

        .tool-summary-table th,
        .tool-summary-table td {
            border: 1px solid #ddd;
            padding: 2px 3px;
            font-size: 7pt;
        }

        .tool-summary-table th {
            background-color: #f0f0f0;
            text-align: center;
            font-weight: bold;
        }

        /* 合計區 */
        .summary-section {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 8px 16px;
            padding: 4px 0;
            border-top: 2px solid #000;
            margin-top: auto;
        }

        .summary-item {
            text-align: right;
        }

        .summary-item .label {
            font-size: 7pt;
            color: #666;
        }

        .summary-item .value {
            font-size: 10pt;
            font-weight: bold;
        }

        /* 簽核區 */
        .signature-section {
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
            padding-top: 5px;
            border-top: 1px dashed #ccc;
        }

        .signature-box {
            width: 30%;
            text-align: center;
        }

        .signature-box .title {
            font-size: 7pt;
            color: #666;
            margin-bottom: 20px;
        }

        .signature-box .line {
            border-bottom: 1px solid #333;
            margin: 0 10px;
        }

        /* 頁尾 */
        .footer-section {
            font-size: 6pt;
            color: #999;
            text-align: center;
            margin-top: 4px;
            padding-top: 3px;
            border-top: 1px solid #ddd;
        }

        /* 列印樣式 */
        @media print {
            body {
                background-color: white;
            }

            .page-container {
                margin: 0;
                box-shadow: none;
                page-break-after: always;
            }

            .no-print {
                display: none !important;
            }
        }

        /* 列印工具列 */
        .print-toolbar {
            position: fixed;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 8px;
            z-index: 1000;
        }

        .print-toolbar button {
            padding: 8px 16px;
            font-size: 12px;
            cursor: pointer;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: white;
        }

        .print-toolbar button.primary {
            background-color: #007bff;
            color: white;
            border-color: #007bff;
        }

        .print-toolbar button:hover {
            opacity: 0.9;
        }

        /* 空白狀態 */
        .empty-state {
            text-align: center;
            padding: 30px;
            color: #666;
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 10px;
            color: #ccc;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <!-- 列印工具列 -->
    <div class="print-toolbar no-print">
        <button onclick="window.print()" class="primary">
            <i class="fas fa-print"></i> 列印
        </button>
        <button onclick="window.close()">
            <i class="fas fa-times"></i> 關閉
        </button>
    </div>

    <div id="print-content">
        <!-- 頁面內容將由 JavaScript 動態載入 -->
        <div class="page-container">
            <div class="main-content">
                <div class="empty-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>載入出貨單資料中...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // 快取變數
            let companyInfoCache = null;
            let companyLogoCache = null;
            let reportDescriptionCache = null;

            // 從 URL 取得參數
            const urlParams = new URLSearchParams(window.location.search);
            const shippingOrderId = urlParams.get('id');
            const isPreviewMode = urlParams.get('preview') === '1';

            if (!shippingOrderId && !isPreviewMode) {
                showError('缺少出貨單 ID 參數');
                return;
            }

            document.title = isPreviewMode ? '出貨單 - 空白預覽' : '出貨單 - 列印';

            // 載入所有資料
            loadAllData(shippingOrderId);

            async function loadAllData(id) {
                try {
                    const loadTasks = [
                        loadCompanyInfo(1),
                        loadCompanyLogo(1),
                        loadReportDescription('shipping_order')
                    ];

                    if (isPreviewMode) {
                        const [companyInfo, companyLogo, reportDesc] = await Promise.all(loadTasks);
                        const previewOrder = buildPreviewShippingOrder();
                        renderShippingOrder(previewOrder, [], null, [], companyInfo, companyLogo, reportDesc);
                        return;
                    }

                    const [orderResult, companyInfo, companyLogo, reportDesc] = await Promise.all([
                        loadShippingOrder(id),
                        ...loadTasks
                    ]);

                    if (orderResult) {
                        renderShippingOrder(orderResult.order, orderResult.items, orderResult.defectSummary, orderResult.toolSummaries, companyInfo, companyLogo, reportDesc);
                    }
                } catch (error) {
                    console.error('載入資料失敗:', error);
                    showError('載入出貨單失敗: ' + error.message);
                }
            }

            async function loadShippingOrder(id) {
                const response = await fetch(`../api/shipping_orders/show.php?id=${id}`, { credentials: 'include' });
                const result = await response.json();

                if (!result.success) {
                    showError(result.message || '載入出貨單失敗');
                    return null;
                }

                return {
                    order: result.order,
                    items: result.items || [],
                    defectSummary: result.defect_summary || result.order?.defect_summary || null,
                    toolSummaries: result.tool_summaries || result.order?.tool_summaries || []
                };
            }

            async function loadCompanyInfo(companyId = 1) {
                if (companyInfoCache) return companyInfoCache;
                try {
                    const response = await fetch(`../api/companies/public_info.php?id=${companyId}`, { credentials: 'include' });
                    const result = await response.json();
                    if (result.success && result.data) {
                        companyInfoCache = result.data;
                    }
                } catch (e) {
                    console.error('載入公司資訊失敗:', e);
                }
                return companyInfoCache;
            }

            async function loadCompanyLogo(companyId = 1) {
                if (companyLogoCache !== null) return companyLogoCache;
                try {
                    const response = await fetch(`../api/companies/public_logo.php?company_id=${companyId}`, { credentials: 'include' });
                    const result = await response.json();
                    if (result.success && result.data) {
                        companyLogoCache = result.data.file_path;
                    } else {
                        companyLogoCache = '';
                    }
                } catch (e) {
                    console.error('載入公司 LOGO 失敗:', e);
                    companyLogoCache = '';
                }
                return companyLogoCache;
            }

            async function loadReportDescription(reportCode) {
                if (reportDescriptionCache) return reportDescriptionCache;
                try {
                    const response = await fetch(`../api/report_descriptions/show.php?report_code=${reportCode}`, { credentials: 'include' });
                    const result = await response.json();
                    if (result.success && result.data) {
                        reportDescriptionCache = result.data;
                    }
                } catch (e) {
                    console.error('載入報表說明失敗:', e);
                }
                return reportDescriptionCache;
            }

            function buildPreviewShippingOrder() {
                return {
                    shipping_order_number: '',
                    shipping_date: '',
                    customer_name: '',
                    order_number: '',
                    shipment_purpose: 'normal',
                    customer: {
                        minimum_order_amount: 0
                    },
                    order: {
                        total_amount: 0
                    }
                };
            }

            function renderShippingOrder(order, items, defectSummary, toolSummaries, companyInfo, companyLogo, reportDesc) {
                const company = companyInfo || {};
                const logoPath = companyLogo || '';
                const reportNotes = reportDesc?.description || '';
                const shippingPurposeLabels = {
                    normal: '一般出貨',
                    defect_return: '不良回送',
                    tool_return: '載具歸還',
                    mixed: '混合出貨'
                };
                const normalizedDefectSummary = defectSummary || {
                    defect_quantity: 0,
                    weight_per_unit_g: 0,
                    total_weight_kg: 0,
                    notes: ''
                };
                const normalizedToolSummaries = Array.isArray(toolSummaries) ? toolSummaries : [];
                // 計算合計
                let totalQuantity = 0;
                let totalGoodWeight = 0;
                let totalDefectWeight = 0;
                let totalToolQuantity = 0;
                let totalToolWeight = 0;
                const processedItems = items.map(item => {
                    totalQuantity += parseFloat(item.shipped_quantity || 0);
                    const defectWeight = (parseFloat(item.total_defect_units || 0) * parseFloat(item.weight_per_unit_g || 0)) / 1000;
                    const goodWeight = Math.max(parseFloat(item.net_weight_kg || 0) - defectWeight, 0);
                    totalGoodWeight += goodWeight;
                    totalDefectWeight += defectWeight;
                    return { ...item, calcGoodWeight: goodWeight, calcDefectWeight: defectWeight };
                });
                normalizedToolSummaries.forEach((summary) => {
                    totalToolQuantity += parseFloat(summary.quantity || 0);
                    totalToolWeight += parseFloat(summary.total_weight_kg || 0);
                });

                // 最低委託額度警示
                const minimumAmount = parseFloat(order.customer?.minimum_order_amount || 0);
                const orderTotal = parseFloat(order.order?.total_amount || 0);
                const isBelowMinimum = minimumAmount > 0 && orderTotal < minimumAmount;

                const html = `
                    <div class="page-container">
                        <div class="main-content">
                            <!-- 公司資訊區 (頁首) -->
                            <div class="company-header">
                                ${logoPath ? `<img src="../${escapeHtml(logoPath)}" alt="公司 LOGO" class="company-logo" onerror="this.classList.add('hidden')">` : ''}
                                <div class="company-info">
                                    <div class="company-name">${escapeHtml(company.name || '')}</div>
                                    <div class="company-details">
                                        ${company.address ? `地址：${escapeHtml(company.address)}<br>` : ''}
                                        ${company.phone ? `電話：${escapeHtml(company.phone)}` : ''}${company.fax ? ` / 傳真：${escapeHtml(company.fax)}` : ''}
                                    </div>
                                </div>
                            </div>

                            <!-- 標題區 -->
                            <div class="header-section">
                                <div class="company-branding">
                                    <span class="main-title">出 貨 單</span>
                                </div>
                                <div class="header-info">
                                    <div class="so-number">${escapeHtml(order.shipping_order_number || '')}</div>
                                    <div class="so-date">出貨日期：${formatDate(order.shipping_date)}</div>
                                </div>
                            </div>

                            <!-- 客戶資訊 -->
                            <div class="customer-section">
                                <div class="customer-info">
                                    <div class="label">客戶名稱</div>
                                    <div class="value">${escapeHtml(order.customer_name || '-')}</div>
                                </div>
                                <div class="order-reference">
                                    <div class="label">出貨性質</div>
                                    <div class="value">${escapeHtml(shippingPurposeLabels[order.shipment_purpose || 'normal'] || '一般出貨')}</div>
                                </div>
                            </div>

                            <!-- 最低委託額度警示 -->
                            <div class="minimum-amount-warning ${isBelowMinimum ? 'show' : ''}">
                                <i class="fas fa-exclamation-triangle"></i>
                                訂單金額 $${formatNumber(orderTotal)} 低於客戶最低委託額度 $${formatNumber(minimumAmount)}
                            </div>

                            <!-- 品項表格 -->
                            <table class="items-table">
                                <thead>
                                    <tr>
                                        <th style="width: 25px;">項次</th>
                                        <th>庫存編號</th>
                                        <th>產品名稱</th>
                                        <th>客戶批號</th>
                                        <th style="width: 50px;">出貨數量</th>
                                        <th style="width: 30px;">單位</th>
                                        <th style="width: 58px;">良品重量(kg)</th>
                                        <th style="width: 62px;">不良品重量(kg)</th>
                                        <th>備註</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${processedItems.length > 0 ? processedItems.map((item, index) => `
                                        <tr>
                                            <td class="text-center">${index + 1}</td>
                                            <td>${escapeHtml(item.inventory_number || '-')}</td>
                                            <td class="item-name">${escapeHtml(item.screening_item_name || item.product_name || '-')}</td>
                                            <td>${escapeHtml(item.customer_batch_number || '-')}</td>
                                            <td class="text-right">${formatNumber(item.shipped_quantity || 0, 0)}</td>
                                            <td class="text-center">${escapeHtml(item.shipped_unit || '支')}</td>
                                            <td class="text-right">${formatNumber(item.calcGoodWeight, 2)}</td>
                                            <td class="text-right">${formatNumber(item.calcDefectWeight, 2)}</td>
                                            <td>${escapeHtml(item.notes || '')}</td>
                                        </tr>
                                    `).join('') : `
                                        <tr>
                                            <td colspan="9" class="text-center">無出貨品項</td>
                                        </tr>
                                    `}
                                </tbody>
                            </table>

                            <div class="supplement-grid">
                                <div class="supplement-card">
                                    <div class="card-title">不良品摘要</div>
                                    <div class="supplement-metrics">
                                        <div class="supplement-metric">
                                            <span class="label">總數量</span>
                                            <span class="value">${formatNumber(normalizedDefectSummary.defect_quantity || 0, 2)}</span>
                                        </div>
                                        <div class="supplement-metric">
                                            <span class="label">單重(g)</span>
                                            <span class="value">${formatNumber(normalizedDefectSummary.weight_per_unit_g || 0, 2)}</span>
                                        </div>
                                        <div class="supplement-metric">
                                            <span class="label">總重量(kg)</span>
                                            <span class="value">${formatNumber(normalizedDefectSummary.total_weight_kg || 0, 2)}</span>
                                        </div>
                                    </div>
                                    <div class="supplement-note">${escapeHtml(normalizedDefectSummary.notes || '-')}</div>
                                </div>
                                <div class="supplement-card">
                                    <div class="card-title">客戶載具摘要</div>
                                    <table class="tool-summary-table">
                                        <thead>
                                            <tr>
                                                <th>名稱</th>
                                                <th>類型</th>
                                                <th>數量</th>
                                                <th>單重</th>
                                                <th>總重</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            ${normalizedToolSummaries.length > 0 ? normalizedToolSummaries.map((summary) => `
                                                <tr>
                                                    <td>${escapeHtml(summary.tool_name || '-')}</td>
                                                    <td>${escapeHtml(summary.tool_type || '-')}</td>
                                                    <td class="text-right">${formatNumber(summary.quantity || 0, 0)}</td>
                                                    <td class="text-right">${formatNumber(summary.unit_weight_kg || 0, 2)}</td>
                                                    <td class="text-right">${formatNumber(summary.total_weight_kg || 0, 2)}</td>
                                                </tr>
                                            `).join('') : `
                                                <tr>
                                                    <td colspan="5" class="text-center">無載具摘要</td>
                                                </tr>
                                            `}
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                            <!-- 備註區 -->
                            ${reportNotes ? `
                            <div class="notes-section">
                                <div class="notes-title">備註</div>
                                <div class="notes-content">${escapeHtml(reportNotes)}</div>
                            </div>
                            ` : ''}

                            <!-- 合計區 -->
                            <div class="summary-section">
                                <div class="summary-item">
                                    <div class="label">出貨品項數</div>
                                    <div class="value">${items.length} 項</div>
                                </div>
                                <div class="summary-item">
                                    <div class="label">出貨總數量</div>
                                    <div class="value">${formatNumber(totalQuantity, 0)} 支</div>
                                </div>
                                <div class="summary-item">
                                    <div class="label">良品總重量</div>
                                    <div class="value">${formatNumber(totalGoodWeight, 2)} kg</div>
                                </div>
                                <div class="summary-item">
                                    <div class="label">不良品總重量</div>
                                    <div class="value">${formatNumber(totalDefectWeight, 2)} kg</div>
                                </div>
                                <div class="summary-item">
                                    <div class="label">摘要不良重量</div>
                                    <div class="value">${formatNumber(normalizedDefectSummary.total_weight_kg || 0, 2)} kg</div>
                                </div>
                                <div class="summary-item">
                                    <div class="label">載具總數量 / 重量</div>
                                    <div class="value">${formatNumber(totalToolQuantity, 0)} / ${formatNumber(totalToolWeight, 2)} kg</div>
                                </div>
                            </div>

                            <!-- 簽核區 -->
                            <div class="signature-section">
                                <div class="signature-box">
                                    <div class="title">製單人員</div>
                                    <div class="line"></div>
                                </div>
                                <div class="signature-box">
                                    <div class="title">出貨人員</div>
                                    <div class="line"></div>
                                </div>
                                <div class="signature-box">
                                    <div class="title">客戶簽收</div>
                                    <div class="line"></div>
                                </div>
                            </div>
                        </div>

                        <!-- 頁尾 -->
                        <div class="footer-section">
                            列印時間：${new Date().toLocaleString('zh-TW')} | 出貨單編號：${escapeHtml(order.shipping_order_number || '')}
                        </div>
                    </div>
                `;

                document.getElementById('print-content').innerHTML = html;
                document.title = `出貨單 - ${order.shipping_order_number || ''}`;
            }

            function showError(message) {
                document.getElementById('print-content').innerHTML = `
                    <div class="page-container">
                        <div class="main-content">
                            <div class="empty-state">
                                <i class="fas fa-exclamation-triangle"></i>
                                <p>${escapeHtml(message)}</p>
                            </div>
                        </div>
                    </div>
                `;
            }

            function escapeHtml(text) {
                if (text === null || text === undefined) return '';
                const div = document.createElement('div');
                div.textContent = String(text);
                return div.innerHTML;
            }

            function formatDate(dateStr) {
                if (!dateStr) return '-';
                const date = new Date(dateStr);
                if (isNaN(date.getTime())) return dateStr;
                return date.toLocaleDateString('zh-TW');
            }

            function formatNumber(value, decimals = 2) {
                if (value === null || value === undefined || value === '') return '0';
                const num = parseFloat(value);
                if (isNaN(num)) return '0';
                return num.toLocaleString('zh-TW', {
                    minimumFractionDigits: decimals,
                    maximumFractionDigits: decimals
                });
            }
        })();
    </script>
</body>
</html>
