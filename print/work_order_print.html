<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生產命令單</title>
    <style>
        @page {
            size: A4 portrait;
            margin: 7mm 8mm;
        }

        :root {
            --ink: #111;
            --line: #888;
            --heading-line: #444;
            --shade: #eeeeec;
            --paper: #fff;
            --inner-line: .1mm;
            --outer-line: .1mm;
            --thick-line: .4mm;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            background: #efefef;
            color: var(--ink);
            font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif;
            font-size: 9pt;
            line-height: 1.2;
        }

        .print-toolbar {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 10;
            display: flex;
            gap: 8px;
        }

        .print-toolbar button {
            border: 1px solid #bbb;
            border-radius: 3px;
            padding: 7px 14px;
            background: #fff;
            cursor: pointer;
        }

        .print-toolbar .primary {
            border-color: #1478c9;
            background: #1478c9;
            color: #fff;
        }

        .sheet {
            width: 210mm;
            min-height: 297mm;
            margin: 12px auto;
            padding: 7mm 10mm 5mm;
            background: var(--paper);
            box-shadow: 0 2px 14px rgba(0, 0, 0, .12);
            display: flex;
            flex-direction: column;
            page-break-after: always;
        }

        .sheet:last-child {
            page-break-after: auto;
        }

        .sheet-main {
            flex: 1;
        }

        .document-header {
            min-height: 19mm;
            display: grid;
            grid-template-columns: 1fr 82mm;
            align-items: center;
            padding: 0 2mm 1mm;
        }

        .document-title {
            font-size: 27pt;
            font-weight: 800;
            letter-spacing: 3px;
        }

        .document-meta {
            text-align: right;
        }

        .document-number {
            border-bottom: var(--outer-line) solid var(--heading-line);
            padding: 0 1mm 1mm;
            font-size: 16pt;
            letter-spacing: .4px;
            white-space: nowrap;
        }

        .split-marker {
            font-weight: 700;
            font-size: 8.5pt;
            white-space: nowrap;
        }

        .split-marker strong {
            display: inline-block;
            border: var(--outer-line) solid var(--line);
            padding: .7mm 1.8mm;
            margin-left: 1.5mm;
        }

        .document-info-bar {
            min-height: 7mm;
            display: grid;
            grid-template-columns: 1fr 41mm 41mm;
            border-top: var(--thick-line) solid var(--heading-line);
            border-bottom: var(--outer-line) solid var(--line);
        }

        .document-info-bar > div {
            display: flex;
            align-items: center;
            padding: 1mm 2mm;
        }

        .document-info-bar .date-cell {
            justify-content: flex-end;
            white-space: nowrap;
            font-size: 8.5pt;
        }

        .section {
            margin-top: 2mm;
            break-inside: avoid;
        }

        .section-heading {
            min-height: 5.8mm;
            padding: 1.1mm 2mm .7mm;
            border-top: var(--thick-line) solid var(--heading-line);
            background: var(--shade);
            font-size: 10pt;
            font-weight: 700;
            letter-spacing: .5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            border: var(--outer-line) solid var(--line);
        }

        th,
        td {
            height: 5.3mm;
            padding: .55mm 1.3mm;
            border: var(--inner-line) solid var(--line);
            vertical-align: middle;
            overflow-wrap: anywhere;
        }

        th {
            background: #f7f7f5;
            text-align: left;
            font-weight: 700;
        }

        .label-cell {
            width: 14%;
            background: #fafafa;
            font-weight: 700;
            white-space: nowrap;
        }

        .value-cell {
            width: 19.33%;
        }

        .text-center {
            text-align: center;
        }

        .text-right {
            text-align: right;
        }

        .split-subvalue {
            display: block;
            color: #444;
            font-size: 7.5pt;
            margin-top: .4mm;
        }

        .service-table th,
        .service-table td {
            height: 5.35mm;
        }

        .service-table .seq {
            width: 6mm;
            text-align: center;
        }

        .service-table .service-name {
            width: 36mm;
        }

        .service-table .tolerance {
            width: 36mm;
        }

        .service-table .ppm {
            width: 13mm;
            text-align: center;
        }

        .service-table .defect {
            width: 18mm;
        }

        .inspection-layout {
            display: grid;
            grid-template-columns: 43mm 1fr;
            gap: 5mm;
            margin-top: 2mm;
            break-inside: avoid;
        }

        .subsection-heading {
            min-height: 5.8mm;
            padding: 1.1mm 2mm .7mm;
            border-top: var(--thick-line) solid var(--heading-line);
            font-size: 9.5pt;
        }

        .dimension-table td {
            height: 5.3mm;
        }

        .dimension-table td:first-child {
            width: 42%;
        }

        .attachment-box {
            min-height: 42.9mm;
            border: var(--outer-line) solid var(--line);
            padding: 1.5mm 2mm;
        }

        .attachment-title {
            font-size: 9pt;
            margin-bottom: 1mm;
        }

        .card-table th,
        .card-table td {
            height: 5.5mm;
        }

        .card-table.compact th,
        .card-table.compact td {
            height: 4.5mm;
            padding-top: .25mm;
            padding-bottom: .25mm;
            font-size: 7.5pt;
        }

        .notes-box {
            min-height: 10mm;
            border: var(--outer-line) solid var(--line);
            padding: 1.5mm 2mm;
            white-space: pre-wrap;
        }

        .document-footer {
            margin-top: 2mm;
            min-height: 10mm;
            padding: 1.5mm 2mm 0;
            border-top: var(--thick-line) solid var(--heading-line);
            display: flex;
            align-items: flex-start;
            gap: 4mm;
        }

        .footer-logo {
            width: 8mm;
            height: 8mm;
            object-fit: contain;
        }

        .footer-company {
            line-height: 1.35;
        }

        .footer-company .zh {
            font-size: 8pt;
        }

        .footer-company .en {
            font-size: 6.5pt;
        }

        .sheet.dense-sheet .section {
            margin-top: 1.5mm;
        }

        .sheet.dense-sheet .section-heading,
        .sheet.dense-sheet .subsection-heading {
            min-height: 5.2mm;
            padding-top: .8mm;
            padding-bottom: .5mm;
        }

        .sheet.dense-sheet .service-table th,
        .sheet.dense-sheet .service-table td {
            height: 4.7mm;
            padding-top: .3mm;
            padding-bottom: .3mm;
            font-size: 8pt;
        }

        .sheet.dense-sheet .inspection-layout {
            margin-top: 1.5mm;
        }

        .sheet.dense-sheet .dimension-table td {
            height: 4.2mm;
            padding-top: .25mm;
            padding-bottom: .25mm;
            font-size: 8pt;
        }

        .sheet.dense-sheet .attachment-box {
            min-height: 34.6mm;
        }

        .sheet.dense-sheet .card-table th,
        .sheet.dense-sheet .card-table td {
            height: 3.8mm;
            padding-top: .15mm;
            padding-bottom: .15mm;
            font-size: 7pt;
        }

        .sheet.dense-sheet .notes-box {
            min-height: 8mm;
        }

        .loading,
        .error-message {
            width: 210mm;
            min-height: 297mm;
            margin: 12px auto;
            padding-top: 80mm;
            background: #fff;
            text-align: center;
            font-size: 14pt;
        }

        .error-message {
            color: #a00;
        }

        @media print {
            html,
            body {
                background: #fff;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .no-print {
                display: none !important;
            }

            .sheet {
                width: auto;
                height: 283mm;
                min-height: 0;
                margin: 0;
                padding: 2mm 2mm 0;
                box-shadow: none;
                overflow: hidden;
            }
        }
    </style>
</head>
<body>
    <div class="print-toolbar no-print">
        <button type="button" class="primary" onclick="window.print()">列印</button>
        <button type="button" onclick="window.close()">關閉</button>
    </div>

    <main id="content">
        <div class="loading">載入工單資料中...</div>
    </main>

<script>
(function() {
    'use strict';

    let companyInfoCache = null;
    let companyLogoUrl = '';
    let reportDescriptionCache = null;

    function escapeHtml(value) {
        if (value === null || value === undefined) return '';
        return String(value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    function toNumber(value, fallback = 0) {
        const parsed = Number.parseFloat(value);
        return Number.isFinite(parsed) ? parsed : fallback;
    }

    function formatNumber(value, decimals = 2) {
        if (value === null || value === undefined || value === '') return '';
        return toNumber(value).toLocaleString('zh-TW', {
            minimumFractionDigits: decimals,
            maximumFractionDigits: decimals
        });
    }

    function formatInt(value) {
        if (value === null || value === undefined || value === '') return '';
        return Math.round(toNumber(value)).toLocaleString('zh-TW');
    }

    function parseLocalDate(value) {
        if (!value) return null;
        const normalized = String(value).replace(' ', 'T');
        const date = new Date(normalized);
        return Number.isNaN(date.getTime()) ? null : date;
    }

    function formatDate(value) {
        const date = parseLocalDate(value);
        if (!date) return value ? escapeHtml(value) : '';
        return `${date.getFullYear() - 1911}/${String(date.getMonth() + 1).padStart(2, '0')}/${String(date.getDate()).padStart(2, '0')}`;
    }

    function formatDateWithWeekday(value) {
        const date = parseLocalDate(value);
        if (!date) return value ? escapeHtml(value) : '';
        const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
        return `${formatDate(value)}（週${weekdays[date.getDay()]}）`;
    }

    function formatDateTime(value) {
        const date = parseLocalDate(value);
        if (!date) return value ? escapeHtml(value) : '';
        return `${formatDate(value)} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
    }

    function getSampleStatusLabel(status, label) {
        if (label !== null && label !== undefined && String(label).trim() !== '') {
            return String(label).trim();
        }
        const raw = String(status || '').trim();
        const normalized = raw.toLowerCase().replace(/\s+/g, '_').replace(/-/g, '_');
        if (normalized === 'yes') return '有';
        if (normalized === 'no') return '無';
        if (['yes_return', 'yes_need_return', 'need_return', 'return', 'return_required'].includes(normalized)) {
            return '有，須歸還';
        }
        if (['no_return', 'return_not_required', 'no_need_return'].includes(normalized)) {
            return '有，不須歸還';
        }
        return raw;
    }

    function resolveAssetUrl(path) {
        if (!path) return '';
        if (/^(https?:|data:|blob:)/i.test(path)) return path;
        return `../${String(path).replace(/^\/+/, '')}`;
    }

    function buildTolerance(service) {
        const plus = service.tolerance_plus_value;
        const minus = service.tolerance_minus_value;
        if ((plus === null || plus === undefined || plus === '')
            && (minus === null || minus === undefined || minus === '')) {
            return '';
        }
        return `${formatNumber(Math.abs(toNumber(plus)), 2)} / ${formatNumber(Math.abs(toNumber(minus)), 2)}`;
    }

    function buildServiceRows(wo) {
        const services = Array.isArray(wo.screening_services_details)
            ? wo.screening_services_details
            : [];
        const rows = services.map((service, index) => `
            <tr>
                <td class="seq">${index + 1}</td>
                <td>${escapeHtml(service.custom_service_name || service.screening_service_name || '')}</td>
                <td>${escapeHtml(buildTolerance(service))}</td>
                <td class="text-center">${escapeHtml(service.ppm_standard || '')}</td>
                <td></td>
                <td>${escapeHtml(service.notes || '')}</td>
            </tr>
        `);
        while (rows.length < 8) {
            rows.push(`
                <tr>
                    <td class="seq">${rows.length + 1}</td>
                    <td></td><td></td><td></td><td></td><td></td>
                </tr>
            `);
        }
        return rows.join('');
    }

    function buildDimensionRows(wo) {
        const fp = wo.first_piece_dimensions || {};
        const dimensions = [
            ['頭高', fp.head_height],
            ['全長', fp.overall_length || fp.length],
            ['牙外徑', fp.thread_outer_diameter],
            ['華司徑', fp.washer_diameter],
            ['外徑', fp.outer_diameter],
            ['孔徑', fp.hole_diameter],
            ['厚度', fp.thickness]
        ];
        return dimensions.map(([label, value]) => `
            <tr>
                <td>${label}</td>
                <td class="text-right">${value ? formatNumber(value, 4) : ''}</td>
            </tr>
        `).join('');
    }

    function distributeCardTargets(totalUnits, rowCount) {
        const targets = [];
        if (rowCount <= 0) return targets;
        const unitsPerCard = Math.ceil(toNumber(totalUnits) / rowCount);
        for (let index = 1; index <= rowCount; index += 1) {
            targets.push(Math.min(unitsPerCard * index, toNumber(totalUnits)));
        }
        return targets;
    }

    function buildCardRows(wo, run, assignedRowCount = null) {
        const runRecords = run && Array.isArray(run.production_records) ? run.production_records : [];
        const targetUnits = run ? toNumber(run.planned_units) : toNumber(wo.total_units);
        const configuredCount = runRecords.length || assignedRowCount || toNumber(wo.tool_quantity);
        const rowCount = Math.max(4, Math.round(configuredCount) || 0);
        const targets = distributeCardTargets(targetUnits, rowCount);

        return {
            compact: rowCount > 6,
            rowCount,
            html: Array.from({ length: rowCount }, (_, index) => {
                const record = runRecords[index] || {};
                const cardNumber = index + 1;
                const target = record.card_number || targets[index] || '';
                return `
                    <tr>
                        <td>${escapeHtml(cardNumber)}</td>
                        <td>${target ? formatInt(target) : ''}</td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                    </tr>
                `;
            }).join('')
        };
    }

    function createPrintContext(wo, run, splitIndex, splitTotal, cardRowCount = null) {
        const isSplit = wo.work_order_type === 'split';
        const runSequence = run
            ? (Number.parseInt(run.machine_sequence, 10) || splitIndex + 1)
            : null;
        return {
            isSplit,
            run,
            splitIndex,
            splitTotal,
            displayNumber: isSplit
                ? `${wo.work_order_number}-${String(runSequence).padStart(2, '0')}`
                : wo.work_order_number,
            machineNumber: run?.machine_number || wo.machine_number || '',
            machineName: run?.machine_name || wo.machine_name || '',
            machineCapability: run?.machine_capability_name || wo.machine_capability_name || '',
            calibrationEmployee: run?.calibration_employee_name || wo.calibration_employee_name || '',
            scheduledStart: run?.scheduled_start_date || wo.scheduled_start_date || '',
            scheduledEnd: run?.scheduled_end_date || wo.scheduled_end_date || '',
            screeningSpeed: run?.screening_speed || wo.screening_speed || '',
            assignedEmployee: run?.assigned_employee_name || wo.assigned_employee_name || '',
            targetNetWeight: run ? toNumber(run.planned_net_weight_kg) : toNumber(wo.net_weight),
            targetUnits: run ? toNumber(run.planned_units) : toNumber(wo.total_units),
            cardRowCount
        };
    }

    function generateWorkOrderHtml(wo, context, companyInfo, reportDesc) {
        const company = companyInfo || {};
        const cardRows = buildCardRows(wo, context.run, context.cardRowCount);
        const serviceCount = Array.isArray(wo.screening_services_details) ? wo.screening_services_details.length : 0;
        const densityClass = cardRows.rowCount > 8 || serviceCount > 8 ? ' dense-sheet' : '';
        const notes = [
            context.run?.notes ? `【拆分機台備註】${context.run.notes}` : '',
            wo.customer_instructions ? `【客戶交辦】${wo.customer_instructions}` : '',
            wo.other_notes ? `【其他說明】${wo.other_notes}` : '',
            reportDesc?.description || ''
        ].filter(Boolean).join('\n');

        const splitMarker = context.isSplit
            ? `<div class="split-marker">主工單：${escapeHtml(wo.work_order_number)}<strong>拆分工單 第 ${context.splitIndex + 1} 份／共 ${context.splitTotal} 份</strong></div>`
            : '<div></div>';

        const splitNetHint = context.isSplit
            ? `<span class="split-subvalue">本份分配：${formatNumber(context.targetNetWeight, 2)} kg</span>`
            : '';
        const splitUnitsHint = context.isSplit
            ? `<span class="split-subvalue">本份分配：${formatInt(context.targetUnits)} 支</span>`
            : '';

        return `
<article class="sheet${densityClass}" data-work-order-type="${escapeHtml(wo.work_order_type || 'normal')}">
    <div class="sheet-main">
        <header class="document-header">
            <div class="document-title">生產命令單</div>
            <div class="document-meta">
                <div class="document-number">${escapeHtml(context.displayNumber)}</div>
            </div>
        </header>
        <div class="document-info-bar">
            ${splitMarker}
            <div class="date-cell">製單日期：${formatDateWithWeekday(wo.created_at)}</div>
            <div class="date-cell"><strong>預計交期：</strong>${formatDateWithWeekday(wo.expected_delivery_date)}</div>
        </div>

        <section class="section">
            <div class="section-heading">訂單資訊</div>
            <table>
                <tbody>
                    <tr>
                        <td class="label-cell">客戶名稱</td>
                        <td class="value-cell">${escapeHtml(wo.customer_name || '')}</td>
                        <td class="label-cell">客戶訂單號</td>
                        <td class="value-cell">${escapeHtml(wo.customer_po_number || '')}</td>
                        <td class="label-cell">訂單編號</td>
                        <td class="value-cell">${escapeHtml(wo.order_number || '')}</td>
                    </tr>
                    <tr>
                        <td class="label-cell">客戶批號</td>
                        <td>${escapeHtml(wo.customer_batch_number || '')}</td>
                        <td class="label-cell">細項編號</td>
                        <td>${escapeHtml(wo.sub_item_number || '')}</td>
                        <td class="label-cell">料號</td>
                        <td>${escapeHtml(wo.part_number || '')}</td>
                    </tr>
                    <tr>
                        <td class="label-cell">受篩產品</td>
                        <td>${escapeHtml(wo.screening_item_name || '')}</td>
                        <td class="label-cell">圖面號碼</td>
                        <td>${escapeHtml(wo.drawing_number || '')}</td>
                        <td class="label-cell">客戶樣品</td>
                        <td>${escapeHtml(getSampleStatusLabel(wo.customer_sample_status, wo.customer_sample_status_label))}</td>
                    </tr>
                </tbody>
            </table>
        </section>

        <section class="section">
            <div class="section-heading">工單生產資訊</div>
            <table>
                <tbody>
                    <tr>
                        <td class="label-cell">入貨重量(含載具)</td>
                        <td>${formatNumber(wo.total_weight_kg, 2)} kg</td>
                        <td class="label-cell">載具總重量</td>
                        <td>${formatNumber(wo.total_tool_weight, 2)} kg</td>
                        <td class="label-cell">淨重</td>
                        <td>${formatNumber(wo.net_weight, 2)} kg${splitNetHint}</td>
                    </tr>
                    <tr>
                        <td class="label-cell">產品單重</td>
                        <td>${wo.weight_per_unit_g ? `${formatNumber(wo.weight_per_unit_g, 4)} g` : ''}</td>
                        <td class="label-cell">總支數</td>
                        <td>${formatInt(wo.total_units)}${splitUnitsHint}</td>
                        <td class="label-cell">載具數量</td>
                        <td>${wo.tool_quantity || ''}</td>
                    </tr>
                    <tr>
                        <td class="label-cell">載具統計</td>
                        <td colspan="5">${escapeHtml(wo.tool_statistics || '')}</td>
                    </tr>
                </tbody>
            </table>
        </section>

        <section class="section">
            <div class="section-heading">生產紀錄</div>
            <table>
                <tbody>
                    <tr>
                        <td class="label-cell">機台編號</td>
                        <td>${escapeHtml(context.machineNumber || context.machineName)}</td>
                        <td class="label-cell">機台能力</td>
                        <td>${escapeHtml(context.machineCapability)}</td>
                        <td class="label-cell">校機人員</td>
                        <td>${escapeHtml(context.calibrationEmployee)}</td>
                    </tr>
                    <tr>
                        <td class="label-cell">開始日期時間</td>
                        <td>${formatDateTime(context.scheduledStart)}</td>
                        <td class="label-cell">結束日期時間</td>
                        <td>${formatDateTime(context.scheduledEnd)}</td>
                        <td class="label-cell">篩選速度</td>
                        <td>${escapeHtml(context.screeningSpeed)}</td>
                    </tr>
                </tbody>
            </table>
        </section>

        <section class="section">
            <div class="section-heading">光篩服務明細</div>
            <table class="service-table">
                <thead>
                    <tr>
                        <th class="seq"></th>
                        <th class="service-name">篩選項目</th>
                        <th class="tolerance">公差值</th>
                        <th class="ppm">PPM</th>
                        <th class="defect">不良品數</th>
                        <th>備註</th>
                    </tr>
                </thead>
                <tbody>${buildServiceRows(wo)}</tbody>
            </table>
        </section>

        <div class="inspection-layout">
            <section>
                <div class="subsection-heading">首件尺寸(mm)</div>
                <table class="dimension-table">
                    <tbody>${buildDimensionRows(wo)}</tbody>
                </table>
            </section>
            <section class="attachment-box">
                <div class="attachment-title">附件及相片</div>
            </section>
        </div>

        <section class="section">
            <div class="section-heading">卡號與重量記錄</div>
            <table class="card-table${cardRows.compact ? ' compact' : ''}">
                <thead>
                    <tr>
                        <th>卡號</th>
                        <th>目標支數</th>
                        <th>實際重量 (kg)</th>
                        <th>日期時間</th>
                        <th>裝載人員</th>
                        <th>備註</th>
                    </tr>
                </thead>
                <tbody>${cardRows.html}</tbody>
            </table>
        </section>

        <section class="section">
            <div class="section-heading">交辦事項與備註</div>
            <div class="notes-box">${escapeHtml(notes)}</div>
        </section>
    </div>

    <footer class="document-footer">
        ${companyLogoUrl ? `<img src="${escapeHtml(companyLogoUrl)}" alt="LOGO" class="footer-logo">` : ''}
        <div class="footer-company">
            <div class="zh">${escapeHtml(company.name || '')}</div>
            <div class="en">${escapeHtml(company.name_en || '')}</div>
        </div>
    </footer>
</article>`;
    }

    async function loadCompanyInfo(companyId = 1) {
        try {
            const response = await fetch(`../api/companies/public_info.php?id=${companyId}`, { credentials: 'include' });
            const result = await response.json();
            companyInfoCache = result.success ? result.data : null;
        } catch (error) {
            console.error('載入公司資訊失敗:', error);
        }
    }

    async function loadCompanyLogo(companyId = 1) {
        try {
            const response = await fetch(`../api/companies/public_logo.php?company_id=${companyId}`, { credentials: 'include' });
            const result = await response.json();
            if (result.success && result.data?.file_path) {
                companyLogoUrl = resolveAssetUrl(result.data.file_path);
            }
        } catch (error) {
            console.error('載入公司 LOGO 失敗:', error);
        }
    }

    async function loadReportDescription() {
        try {
            const response = await fetch('../api/report_descriptions/show.php?report_code=work_order', { credentials: 'include' });
            const result = await response.json();
            reportDescriptionCache = result.success ? result.data : null;
        } catch (error) {
            console.error('載入報表說明失敗:', error);
        }
    }

    function getRequestedIds() {
        const params = new URLSearchParams(window.location.search);
        const singleId = params.get('id');
        const batchIds = params.get('ids');
        if (singleId) return [singleId];
        return batchIds ? batchIds.split(',').map((id) => id.trim()).filter(Boolean) : [];
    }

    async function fetchWorkOrder(id) {
        const response = await fetch(`../api/work_orders/show.php?id=${encodeURIComponent(id)}`, { credentials: 'include' });
        const result = await response.json();
        if (!response.ok || !result.success || !result.data) {
            throw new Error(result.message || `工單 ${id} 載入失敗`);
        }
        return result.data;
    }

    function buildPagesForWorkOrder(wo) {
        if (wo.work_order_type !== 'split') {
            return [generateWorkOrderHtml(
                wo,
                createPrintContext(wo, null, 0, 1),
                companyInfoCache,
                reportDescriptionCache
            )];
        }

        const runs = Array.isArray(wo.machine_runs) ? wo.machine_runs : [];
        if (runs.length === 0) {
            return [`<div class="error-message">拆分工單 ${escapeHtml(wo.work_order_number)} 尚未建立機台明細，無法列印。</div>`];
        }

        const totalToolQuantity = Math.max(0, Math.round(toNumber(wo.tool_quantity)));
        const totalPlannedUnits = runs.reduce((sum, run) => sum + Math.max(0, toNumber(run.planned_units)), 0);
        const allocatedCardRows = runs.map((run) => {
            const existingRows = Array.isArray(run.production_records) ? run.production_records.length : 0;
            return existingRows > 0 ? existingRows : 0;
        });
        const unrecordedIndexes = runs
            .map((run, index) => ({ run, index }))
            .filter(({ index }) => allocatedCardRows[index] === 0);
        let remainingToolQuantity = Math.max(
            0,
            totalToolQuantity - allocatedCardRows.reduce((sum, count) => sum + count, 0)
        );

        unrecordedIndexes.forEach(({ run, index }, position) => {
            if (remainingToolQuantity <= 0) return;
            const remainingRuns = unrecordedIndexes.length - position;
            const plannedRatio = totalPlannedUnits > 0
                ? Math.max(0, toNumber(run.planned_units)) / totalPlannedUnits
                : 1 / Math.max(1, unrecordedIndexes.length);
            const proportionalCount = Math.round(totalToolQuantity * plannedRatio);
            const assignedCount = position === unrecordedIndexes.length - 1
                ? remainingToolQuantity
                : Math.max(1, Math.min(remainingToolQuantity - Math.max(0, remainingRuns - 1), proportionalCount));
            allocatedCardRows[index] = assignedCount;
            remainingToolQuantity -= assignedCount;
        });

        let cursor = 0;
        while (remainingToolQuantity > 0 && unrecordedIndexes.length > 0) {
            allocatedCardRows[unrecordedIndexes[cursor % unrecordedIndexes.length].index] += 1;
            remainingToolQuantity -= 1;
            cursor += 1;
        }

        return runs.map((run, index) => generateWorkOrderHtml(
            wo,
            createPrintContext(wo, run, index, runs.length, allocatedCardRows[index]),
            companyInfoCache,
            reportDescriptionCache
        ));
    }

    async function loadWorkOrders() {
        const ids = getRequestedIds();
        const content = document.getElementById('content');
        if (ids.length === 0) {
            content.innerHTML = '<div class="error-message">未指定工單 ID</div>';
            return;
        }

        try {
            await Promise.all([loadCompanyInfo(), loadCompanyLogo(), loadReportDescription()]);
            const workOrders = [];
            for (const id of ids) {
                workOrders.push(await fetchWorkOrder(id));
            }
            const pages = workOrders.flatMap(buildPagesForWorkOrder);
            content.innerHTML = pages.join('');

            const totalPages = content.querySelectorAll('.sheet').length;
            document.title = workOrders.length === 1
                ? `生產命令單 - ${workOrders[0].work_order_number}${totalPages > 1 ? ` (${totalPages} 份)` : ''}`
                : `生產命令單 - ${totalPages} 份`;
        } catch (error) {
            console.error('載入工單失敗:', error);
            content.innerHTML = `<div class="error-message">${escapeHtml(error.message || '載入工單失敗')}</div>`;
        }
    }

    document.addEventListener('DOMContentLoaded', loadWorkOrders);
})();
</script>
</body>
</html>
