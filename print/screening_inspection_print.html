<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>品質檢驗報表 - 列印</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- QR Code 生成套件 (使用 qrcodejs) -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <!-- Chart.js 圓餅圖 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --a4-width: 210mm;
            --a4-height: 297mm;
            --page-margin: 5mm;
            --content-padding: 6mm;
            --printable-width: calc(var(--a4-width) - (var(--page-margin) * 2));
            --printable-height: calc(var(--a4-height) - (var(--page-margin) * 2));
        }

        @page {
            size: A4;
            margin: var(--page-margin);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft JhengHei", "SimHei", sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #000;
            font-size: 9pt;
            line-height: 1.3;
        }

        .page-container {
            background-color: white;
            width: var(--printable-width);
            min-height: var(--printable-height);
            margin: 20px auto;
            padding: var(--content-padding);
            box-sizing: border-box;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }

        .main-content {
            flex: 1;
        }

        /* 頂部標題區 */
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 2px solid #000;
            margin-bottom: 7px;
            padding-bottom: 4px;
        }

        .header-left {
            flex: 1;
        }

        .main-title {
            font-size: 16pt;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 4px;
        }

        .sub-title {
            font-size: 10pt;
            font-weight: 600;
            color: #555;
        }

        .header-right {
            text-align: right;
        }

        .qrcode-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #qrcode-container {
            width: 60px;
            height: 60px;
        }

        #qrcode-container canvas,
        #qrcode-container img {
            width: 60px !important;
            height: 60px !important;
        }

        .qrcode-label {
            font-size: 7pt;
            color: #666;
            margin-top: 3px;
        }

        /* 資訊分組區 */
        .info-groups {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-bottom: 8px;
        }

        .info-card {
            border: 1px solid #cfcfcf;
            border-radius: 4px;
            background: linear-gradient(180deg, #fcfcfc 0%, #f7f7f7 100%);
            overflow: hidden;
        }

        .info-card-header {
            padding: 4px 7px;
            font-size: 9.2pt;
            font-weight: 800;
            border-bottom: 1px solid #dedede;
            letter-spacing: 0.2px;
        }

        .info-card.customer .info-card-header {
            background: #eef4ff;
            border-left: 3px solid #2563eb;
        }

        .info-card.order .info-card-header {
            background: #fff6ea;
            border-left: 3px solid #d97706;
        }

        .info-card.production .info-card-header {
            background: #eefaf3;
            border-left: 3px solid #15803d;
        }

        .info-card.production {
            grid-column: 1 / -1;
        }

        .info-card-header .title-en {
            font-size: 7.8pt;
            font-weight: normal;
            color: #666;
            margin-left: 6px;
        }

        .meta-table {
            width: 100%;
            margin: 0;
            border-collapse: separate;
            border-spacing: 0;
            table-layout: auto;
        }

        /* 結果摘要區 */
        .summary-section {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            margin-bottom: 5px;
        }

        .summary-card {
            text-align: center;
            padding: 3px 4px;
            border: 1.5px solid #333;
            background-color: #fff;
        }

        .summary-card.highlight {
            background-color: #f0f0f0;
        }

        .summary-card.good {
            border-color: #28a745;
            background-color: #e8f5e9;
        }

        .summary-card.defect {
            border-color: #dc3545;
            background-color: #ffebee;
        }

        .summary-card.rate {
            border-color: #fd7e14;
            background-color: #fff3e0;
        }

        .summary-number {
            font-size: 10pt;
            font-weight: bold;
            display: block;
        }

        .summary-label {
            font-size: 8pt;
            color: #666;
            display: block;
            margin-top: 2px;
        }

        /* 表格共用設定 */
        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            margin-bottom: 7px;
        }

        th, td {
            border: 1px solid #999;
            padding: 3px 5px;
            text-align: left;
            vertical-align: middle;
            font-size: 8pt;
        }

        th {
            background-color: #e6e6e6;
            font-weight: 800;
            text-align: center;
        }

        .meta-table th,
        .meta-table td {
            border: none;
            font-size: 8.3pt;
            padding: 3px 7px;
            vertical-align: top;
            line-height: 1.25;
        }

        .field-title {
            display: inline-flex;
            align-items: baseline;
            gap: 4px;
            white-space: nowrap;
        }

        .field-title .title-en {
            color: #777;
            font-size: 6.6pt;
            font-weight: 500;
        }

        .meta-table tr + tr th,
        .meta-table tr + tr td {
            border-top: 1px dashed #d9d9d9;
        }

        .meta-table th {
            width: 38%;
            text-align: left;
            color: #555;
            font-weight: 700;
            background: transparent;
            border-right: 1px solid #d7d7d7;
        }

        .meta-table td {
            color: #1f2937;
            font-weight: 600;
            padding-left: 8px;
        }

        .meta-table tr.empty-row th,
        .meta-table tr.empty-row td {
            color: transparent;
        }

        .text-center { text-align: center; }
        .text-right { text-align: right; }

        /* 圖表區 */
        .chart-section {
            width: 100%;
            margin: 6px 0 8px;
            page-break-inside: avoid;
        }

        .chart-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .chart-title {
            font-size: 10pt;
            font-weight: 800;
            margin-bottom: 4px;
            text-align: center;
        }

        .pie-canvas-container {
            width: 92%;
            margin: 0 auto;
            display: block;
        }

        /* SVG 圖表容器 */

        .chart-title-en {
            font-size: 8pt;
            color: #555;
            font-weight: normal;
            margin-top: 1px;
            text-align: center;
        }

        .no-chart-message {
            text-align: center;
            color: #28a745;
            font-size: 12pt;
            padding: 30px;
            background-color: #e8f5e9;
            border-radius: 8px;
        }

        /* 報表說明區 */
        .report-description-section {
            margin: 6px 0 0;
            padding: 6px 10px;
            border: 1px solid #ccc;
            background-color: #f8f9fa;
            border-radius: 3px;
            page-break-inside: avoid;
        }

        .report-description-section h4 {
            margin: 0 0 3px 0;
            font-size: 9pt;
            font-weight: 800;
            color: #333;
        }

        .report-description-section h4 .title-en {
            font-size: 7.5pt;
            font-weight: normal;
            color: #666;
            margin-left: 6px;
        }

        .report-description-content {
            font-size: 8pt;
            line-height: 1.3;
            color: #555;
            white-space: pre-wrap;
        }

        /* 頁尾 */
        footer {
            margin-top: auto;
            padding-top: 8px;
            border-top: 2px solid #000;
            display: grid;
            grid-template-columns: 1.1fr 1.5fr 1fr;
            gap: 10px;
            align-items: end;
            font-size: 8pt;
        }

        .footer-brand {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .footer-address,
        .footer-contacts {
            font-size: 7.2pt;
            line-height: 1.3;
            color: #333;
        }

        .footer-field {
            display: flex;
            align-items: baseline;
            gap: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .footer-field .label {
            color: #666;
            flex-shrink: 0;
        }

        .footer-field .value {
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .footer-contacts {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2px;
            justify-items: start;
        }

        .footer-logo {
            height: 28px;
            width: auto;
        }

        .footer-logo.hidden {
            display: none;
        }

        .footer-brand-text .zh {
            font-size: 11pt;
            font-weight: bold;
        }

        .footer-brand-text .en {
            font-size: 8pt;
            color: #666;
        }

        @media (max-width: 1024px) {
            .info-groups {
                grid-template-columns: 1fr;
            }

            .info-card.production {
                grid-column: auto;
            }

            .meta-table th {
                width: 42%;
            }
        }

        /* 列印設定 */
        @media print {
            .no-print { display: none !important; }
            body {
                background-color: white;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .page-container {
                margin: 0 auto;
                width: var(--printable-width);
                min-height: auto;
                height: auto;
                box-shadow: none;
                padding: var(--content-padding);
                display: block;
            }
            .main-content {
                flex: none;
            }
            .info-groups {
                grid-template-columns: 1fr 1fr;
            }
            .info-card.production {
                grid-column: 1 / -1;
            }
            .meta-table th {
                width: 38%;
            }
            .info-card-header {
                padding-top: 3px;
                padding-bottom: 3px;
            }
            .meta-table th,
            .meta-table td {
                padding-top: 2px;
                padding-bottom: 2px;
                line-height: 1.15;
            }
            .meta-table tr.empty-row th,
            .meta-table tr.empty-row td {
                padding-top: 5px;
                padding-bottom: 5px;
            }
            .chart-section,
            .report-description-section,
            footer {
                break-inside: auto;
                page-break-inside: auto;
            }
            footer {
                margin-top: 6px;
                padding-top: 6px;
                gap: 8px;
            }
            .chart-section {
                margin: 4px 0 6px;
            }
            .pie-canvas-container {
                width: 88%;
            }
            .report-description-section {
                margin-top: 4px;
                padding: 5px 8px;
            }
            .summary-card.good { background-color: #e8f5e9 !important; }
            .summary-card.defect { background-color: #ffebee !important; }
            .summary-card.rate { background-color: #fff3e0 !important; }
        }

        /* Loading 狀態 */
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .error-message {
            text-align: center;
            padding: 40px;
            color: #dc3545;
            font-size: 14pt;
        }

        /* 列印工具列 */
        .print-toolbar {
            position: fixed;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 8px;
            z-index: 1000;
        }

        .print-toolbar button {
            padding: 8px 16px;
            font-size: 12px;
            cursor: pointer;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: white;
        }

        .print-toolbar button.primary {
            background-color: #007bff;
            color: white;
            border-color: #007bff;
        }

        .print-toolbar button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<!-- 列印工具列 -->
<div class="print-toolbar no-print">
    <button onclick="window.print()" class="primary">
        <i class="fas fa-print"></i> 列印
    </button>
    <button onclick="window.close()">
        <i class="fas fa-times"></i> 關閉
    </button>
</div>

<div class="page-container">
    <div class="main-content" id="reportContent">
        <div class="loading">載入中...</div>
    </div>
    <footer id="reportFooter" style="display:none;">
        <div class="footer-brand">
            <img src="" alt="公司LOGO" class="footer-logo hidden" id="footerLogo">
            <div class="footer-brand-text">
                <div class="zh" id="footerCompanyName"></div>
                <div class="en" id="footerCompanyNameEn"></div>
            </div>
        </div>
        <div class="footer-address">
            <div class="footer-field">
                <span class="label">住址</span>
                <span class="value" id="footerAddress">-</span>
            </div>
        </div>
        <div class="footer-contacts">
            <div class="footer-field">
                <span class="label">電話</span>
                <span class="value" id="footerPhone">-</span>
            </div>
            <div class="footer-field">
                <span class="label">傳真</span>
                <span class="value" id="footerFax">-</span>
            </div>
            <div class="footer-field">
                <span class="label">統編</span>
                <span class="value" id="footerTaxId">-</span>
            </div>
        </div>
    </footer>
</div>

<script>
(function() {
    'use strict';

    // 從 URL 取得工單 ID
    const urlParams = new URLSearchParams(window.location.search);
    const workOrderId = urlParams.get('work_order_id') || urlParams.get('id');
    const isPreviewMode = urlParams.get('preview') === '1';

    if (!workOrderId && !isPreviewMode) {
        showError('缺少工單 ID 參數');
        return;
    }

    document.title = isPreviewMode ? '品質檢驗報表 - 空白預覽' : '品質檢驗報表 - 列印';

    // 載入報表資料
    if (isPreviewMode) {
        loadPreviewReportData();
    } else {
        loadReportData(workOrderId);
    }

    async function loadReportData(id) {
        try {
            const response = await fetch(`../api/reports/screening_inspection.php?work_order_id=${id}`, { credentials: 'include' });
            const result = await response.json();

            if (!result.success) {
                showError(result.message || '載入報表資料失敗');
                return;
            }

            renderReport(result.data);
        } catch (error) {
            console.error('載入報表失敗:', error);
            showError('載入報表時發生錯誤');
        }
    }

    async function loadPreviewReportData() {
        try {
            const [companyInfo, reportDesc] = await Promise.all([
                loadCompanyInfo(1),
                loadReportDescription('screening_inspection')
            ]);

            renderReport({
                work_order: {
                    id: 0,
                    work_order_number: '',
                    actual_end_date: '',
                    assigned_employee_name: ''
                },
                order: {
                    customer_po_number: '',
                    order_number: ''
                },
                order_item: {
                    part_number: '',
                    drawing_number: '',
                    customer_batch_number: ''
                },
                customer: {
                    id: 1,
                    name: '',
                    name_en: '',
                    address: '',
                    phone: '',
                    fax: '',
                    tax_id: '',
                    contact_person: ''
                },
                screening_item: {
                    name: ''
                },
                screening_results: [],
                summary: {
                    total_units: 0,
                    good_units: 0,
                    defect_units: 0,
                    defect_units_distribution: 0,
                    defect_rate_percent: 0
                },
                chart_data: {
                    labels: [],
                    values: [],
                    labels_en: []
                },
                company: companyInfo || {},
                qrcode_url: '',
                generated_at: '',
                report_description: reportDesc?.description || '',
                machine_runs: []
            });
        } catch (error) {
            console.error('載入預覽報表失敗:', error);
            showError('載入空白預覽時發生錯誤');
        }
    }

    function showError(message) {
        document.getElementById('reportContent').innerHTML = `
            <div class="error-message">${message}</div>
        `;
    }

    function formatNumber(num, decimals = 0) {
        if (num === null || num === undefined) return '-';
        return Number(num).toLocaleString('zh-TW', {
            minimumFractionDigits: decimals,
            maximumFractionDigits: decimals
        });
    }

    function formatDate(dateStr) {
        if (!dateStr) return '-';
        const date = new Date(dateStr);
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function buildLocalStaticReportUrl(filePath) {
        const normalizedPath = String(filePath || '')
            .replace(/\\/g, '/')
            .replace(/^\/+/, '');
        if (!normalizedPath) return '';

        const pathname = window.location.pathname || '/';
        const printMarker = '/print/';
        const markerIndex = pathname.lastIndexOf(printMarker);
        const appBasePath = markerIndex >= 0 ? pathname.slice(0, markerIndex + 1) : '/';
        return `${window.location.origin}${appBasePath}${normalizedPath}`;
    }

    async function ensureQrReportUrl(workOrderId, fallbackUrl) {
        try {
            const body = new URLSearchParams({ work_order_id: String(workOrderId) });
            const response = await fetch('../api/reports/generate_static.php', {
                method: 'POST',
                credentials: 'include',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8'
                },
                body: body.toString()
            });

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            const result = await response.json();
            if (result.success && result.data) {
                if (result.data.public_url) {
                    return result.data.public_url;
                }
                if (result.data.file_path) {
                    const localUrl = buildLocalStaticReportUrl(result.data.file_path);
                    if (localUrl) return localUrl;
                }
            }
        } catch (error) {
            console.warn('產生 QR 靜態頁失敗，改用備援連結：', error);
        }

        return fallbackUrl;
    }

    async function loadCompanyInfo(companyId) {
        try {
            const response = await fetch(`../api/companies/public_info.php?id=${companyId}`, { credentials: 'include' });
            const result = await response.json();
            return result.success && result.data ? result.data : null;
        } catch (error) {
            console.error('載入公司資訊失敗:', error);
            return null;
        }
    }

    async function loadReportDescription(reportCode) {
        try {
            const response = await fetch(`../api/report_descriptions/show.php?report_code=${reportCode}`, { credentials: 'include' });
            const result = await response.json();
            return result.success && result.data ? result.data : null;
        } catch (error) {
            console.error('載入報表說明失敗:', error);
            return null;
        }
    }

    async function renderReport(data) {
        const { work_order, order, order_item, customer, screening_item,
                screening_results, summary, chart_data, company, qrcode_url, generated_at,
                report_description, machine_runs = [] } = data;
        const defectDistributionUnits = Number(summary.defect_units_distribution ?? summary.defect_units ?? 0);
        const displayTotalUnits = Number(summary.total_units ?? 0);
        const displayGoodUnits = Math.max(displayTotalUnits - defectDistributionUnits, 0);
        const displayDefectRate = displayTotalUnits > 0 ? (defectDistributionUnits / displayTotalUnits) * 100 : 0;

        let qrUrl = '';
        if (!isPreviewMode && work_order.id > 0) {
            const localFallback = buildLocalStaticReportUrl(`export/qrcode_pages/${work_order.work_order_number}.html`);
            const fallbackUrl = qrcode_url || localFallback || `${window.location.origin}/`;
            qrUrl = await ensureQrReportUrl(work_order.id, fallbackUrl);
        }

        let html = `
            <!-- 標題區 -->
            <div class="header-section">
                <div class="header-left">
                    <div class="main-title">品質檢驗報表</div>
                    <div class="sub-title">Quality Inspection Report</div>
                </div>
                <div class="header-right">
                    <div class="qrcode-wrapper">
                        <div id="qrcode-container"></div>
                        <span class="qrcode-label">掃描查看線上報表<br>Scan for Online Report</span>
                    </div>
                </div>
            </div>

            <!-- 基本資訊區 -->
            <div class="info-groups">
                <div class="info-card customer">
                    <div class="info-card-header">👤 客戶資訊 <span class="title-en">Customer Profile</span></div>
                    <table class="meta-table">
                        <tr>
                            <th><span class="field-title">客戶名稱 <span class="title-en">Customer Name</span></span></th>
                            <td>${escapeHtml(customer.name) || '-'}</td>
                        </tr>
                        <tr>
                            <th><span class="field-title">聯絡人 <span class="title-en">Customer Contact</span></span></th>
                            <td>${escapeHtml(customer.contact_person) || '-'}</td>
                        </tr>
                        <tr class="empty-row">
                            <th>&nbsp;</th>
                            <td>&nbsp;</td>
                        </tr>
                        <tr class="empty-row">
                            <th>&nbsp;</th>
                            <td>&nbsp;</td>
                        </tr>
                    </table>
                </div>
                <div class="info-card order">
                    <div class="info-card-header">📦 訂單資訊 <span class="title-en">Order Details</span></div>
                    <table class="meta-table">
                        <tr>
                            <th><span class="field-title">客戶訂單編號 <span class="title-en">Customer Order No.</span></span></th>
                            <td>${escapeHtml(order.customer_po_number || order.order_number) || '-'}</td>
                        </tr>
                        <tr>
                            <th><span class="field-title">料號 <span class="title-en">Part No.</span></span></th>
                            <td>${escapeHtml(order_item.part_number) || '-'}</td>
                        </tr>
                        <tr>
                            <th><span class="field-title">圖號 <span class="title-en">Drawing No.</span></span></th>
                            <td>${escapeHtml(order_item.drawing_number) || '-'}</td>
                        </tr>
                        <tr>
                            <th><span class="field-title">客戶批號 <span class="title-en">Customer Batch No.</span></span></th>

                <thead>

                        <th>公差値<br><small>Tolerance</small></th>

            ${Array.isArray(machine_runs) && machine_runs.length > 0 ? `

            ${report_description ? `

    /**
     * SVG 三欄圖表：柏拉圖（左）+ 圓餅圖（中）+ 數據明細（右）
     */
    function renderSvgCharts(chartData) {
        const items = chartData.labels.map((label, i) => ({
            label,
            labelEn: (chartData.labels_en && chartData.labels_en[i]) ? chartData.labels_en[i] : label,
            value: chartData.values[i]
        }));
        const n = items.length;
        const total = items.reduce((s, it) => s + it.value, 0);
        if (total === 0 || n === 0) return '';

        // 依數量降序排列（柏拉圖用）
        const sorted = items.map((it, i) => ({ ...it, origIndex: i }))
            .sort((a, b) => b.value - a.value);

        const rowH = Math.max(15, Math.min(18, 150 / n));
        const svgH = Math.max(168, n * rowH + 22);
        const svgW = 520;
        const grays = ['#2d2d2d','#525252','#737373','#8f8f8f','#ababab','#c4c4c4','#d8d8d8','#3d3d3d','#616161','#7e7e7e'];

        // ── 柏拉圖區域 ────────────────────────────────────────────
        const pX1 = 24, pY1 = 9, pX2 = 162, pY2 = svgH - 20;
        const pW = pX2 - pX1, pH = pY2 - pY1;
        const barW = (pW / n) * 0.62;
        const barGap = pW / n;
        const maxVal = sorted[0].value;

        let barsSvg = '';
        let cumulative = 0;
        const cumPoints = [];

        sorted.forEach((item, i) => {
            const bh = (item.value / maxVal) * pH;
            const bx = pX1 + i * barGap + barGap * 0.19;
            const by = pY1 + pH - bh;
            barsSvg += `<rect x="${bx.toFixed(1)}" y="${by.toFixed(1)}" width="${barW.toFixed(1)}" height="${bh.toFixed(1)}" fill="${grays[item.origIndex % grays.length]}"/>`;
            barsSvg += `<text x="${(pX1 + i * barGap + barGap * 0.5).toFixed(1)}" y="${(pY2 + 10).toFixed(1)}" text-anchor="middle" font-size="6.2" fill="#555">${i + 1}</text>`;
            cumulative += item.value;
            const cumPct = cumulative / total;
            cumPoints.push({ x: pX1 + i * barGap + barGap * 0.5, y: pY1 + pH * (1 - cumPct), pct: cumPct });
        });

        // Y 軸 & X 軸線
        barsSvg += `<line x1="${pX1}" y1="${pY1}" x2="${pX1}" y2="${pY2}" stroke="#aaa" stroke-width="0.8"/>`;
        barsSvg += `<line x1="${pX1}" y1="${pY2}" x2="${pX2}" y2="${pY2}" stroke="#aaa" stroke-width="0.8"/>`;
        // 左 Y 軸刻度
        barsSvg += `<text x="${pX1 - 2}" y="${pY1 + 4}" text-anchor="end" font-size="6" fill="#555">${maxVal}</text>`;
        barsSvg += `<text x="${pX1 - 2}" y="${(pY1 + pH * 0.5 + 3).toFixed(1)}" text-anchor="end" font-size="6" fill="#555">${Math.round(maxVal / 2)}</text>`;
        barsSvg += `<text x="${pX1 - 2}" y="${pY2}" text-anchor="end" font-size="6" fill="#555">0</text>`;
        // 右 Y 軸（累積%）
        barsSvg += `<line x1="${pX2}" y1="${pY1}" x2="${pX2}" y2="${pY2}" stroke="#eee" stroke-width="0.6" stroke-dasharray="2,2"/>`;
        barsSvg += `<text x="${pX2 + 2}" y="${pY1 + 4}" font-size="6" fill="#dc3545">100%</text>`;
        barsSvg += `<text x="${pX2 + 2}" y="${(pY1 + pH * 0.5 + 3).toFixed(1)}" font-size="6" fill="#dc3545">50%</text>`;
        // 累積折線
        if (cumPoints.length > 1) {
            const pts = cumPoints.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
            barsSvg += `<polyline points="${pts}" fill="none" stroke="#dc3545" stroke-width="1.5"/>`;
        }
        cumPoints.forEach(p => {
            barsSvg += `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="2.2" fill="#dc3545"/>`;
        });

        // ── 圓餅圖（中央）─────────────────────────────────────────
        const pieCX = 250, pieCY = svgH / 2;
        const pieR = Math.min(62, (svgH - 26) / 2 - 4);
        let pieSvg = '';
        let startAngle = -Math.PI / 2;
        items.forEach((item, i) => {
            const angle = (item.value / total) * Math.PI * 2;
            const endAngle = startAngle + angle;
            const x1 = pieCX + Math.cos(startAngle) * pieR;
            const y1 = pieCY + Math.sin(startAngle) * pieR;
            const x2 = pieCX + Math.cos(endAngle) * pieR;
            const y2 = pieCY + Math.sin(endAngle) * pieR;
            const largeArc = angle > Math.PI ? 1 : 0;
            pieSvg += `<path d="M ${pieCX.toFixed(1)} ${pieCY.toFixed(1)} L ${x1.toFixed(1)} ${y1.toFixed(1)} A ${pieR} ${pieR} 0 ${largeArc} 1 ${x2.toFixed(1)} ${y2.toFixed(1)} Z" fill="${grays[i % grays.length]}" stroke="white" stroke-width="1.2"/>`;
            startAngle = endAngle;
        });
        pieSvg += `<circle cx="${pieCX}" cy="${pieCY.toFixed(1)}" r="${pieR}" fill="none" stroke="#444" stroke-width="0.8"/>`;

        // ── 數據明細（右欄）──────────────────────────────────────
        const lgX = 332;
        const lgStartY = Math.max(8, (svgH - n * rowH) / 2);
        let legendSvg = '';
        items.forEach((item, i) => {
            const y = lgStartY + i * rowH;
            const pct = ((item.value / total) * 100).toFixed(1);
            legendSvg += `<rect x="${lgX}" y="${y}" width="9" height="9" fill="${grays[i % grays.length]}" stroke="#666" stroke-width="0.4"/>`;
            legendSvg += `<text x="${lgX + 12}" y="${y + 7}" font-size="7.6" fill="#111" font-weight="bold" font-family="Microsoft JhengHei,sans-serif">${i + 1}. ${item.label}</text>`;
            legendSvg += `<text x="${lgX + 12}" y="${y + rowH - 3}" font-size="6.3" fill="#888" font-family="Arial,sans-serif">${item.labelEn}</text>`;
            legendSvg += `<text x="${svgW - 3}" y="${y + 7}" font-size="7.2" fill="#333" text-anchor="end" font-family="Arial,sans-serif">${formatNumber(item.value)} (${pct}%)</text>`;
        });

        // ── 分隔線 ────────────────────────────────────────────────
        const d1 = pX2 + 6, d2 = lgX - 6;
        return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${svgW} ${svgH}" width="100%" style="display:block;">
            ${barsSvg}
            ${pieSvg}
            ${legendSvg}
            <line x1="${d1}" y1="5" x2="${d1}" y2="${svgH - 10}" stroke="#ddd" stroke-width="0.8"/>
            <line x1="${d2}" y1="5" x2="${d2}" y2="${svgH - 10}" stroke="#ddd" stroke-width="0.8"/>
        </svg>`;
    }

    async function loadCompanyLogo(companyId) {
        try {
            const response = await fetch(`../api/companies/public_logo.php?company_id=${companyId}`, { credentials: 'include' });
            const result = await response.json();

            if (result.success && result.data && result.data.file_path) {
                const logoImg = document.getElementById('footerLogo');
                logoImg.src = '../' + result.data.file_path;
                logoImg.classList.remove('hidden');
                logoImg.onerror = function() {
                    this.classList.add('hidden');
                };
            }
        } catch (error) {
            console.error('載入 LOGO 失敗:', error);
        }
    }
})();
