<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>現場狀態看板</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="status_board.css?v=20260508-5rows">
</head>
<body>
    <main class="board-shell">
        <header class="board-header">
            <div>
                <div class="board-kicker">MES LIVE BOARD</div>
                <h1>現場狀態看板</h1>
            </div>
            <div class="board-meta">
                <span data-refresh-status>每 30 秒更新</span>
                <span data-last-updated>--</span>
                <span class="header-clock" data-clock>--:--:--</span>
            </div>
        </header>

        <section class="board-main">
            <section class="schedule-panel" aria-labelledby="work-orders-title">
                <div class="panel-title">
                    <h2 id="work-orders-title">生產工單</h2>
                    <span data-work-count>0 筆</span>
                </div>
                <div class="schedule-table">
                    <div class="schedule-head">
                        <span>時間</span>
                        <span>工單</span>
                        <span>客戶 / 產品</span>
                        <span>狀態</span>
                    </div>
                    <div data-work-orders class="schedule-body ticker-host"></div>
                </div>
            </section>

            <section class="schedule-panel" aria-labelledby="shipping-orders-title">
                <div class="panel-title">
                    <h2 id="shipping-orders-title">出貨單</h2>
                    <span data-shipping-count>0 筆</span>
                </div>
                <div class="schedule-table">
                    <div class="schedule-head">
                        <span>日期</span>
                        <span>出貨單</span>
                        <span>客戶 / 數量</span>
                        <span>狀態</span>
                    </div>
                    <div data-shipping-orders class="schedule-body ticker-host"></div>
                </div>
            </section>
        </section>

        <section class="announcement-band" aria-labelledby="announcements-title">
            <div class="announcement-title">
                <h2 id="announcements-title">最新公告</h2>
            </div>
            <div data-announcements class="announcement-list ticker-host"></div>
        </section>
    </main>

    <script src="status_board.js?v=20260508-5rows"></script>
</body>
</html>
